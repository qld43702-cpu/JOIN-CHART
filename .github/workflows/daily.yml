name: 매일 작도 스캔

on:
  schedule:
    # 한국시간 매일 오후 4시 30분 (UTC 07:30), 평일
    - cron: '30 7 * * 1-5'
  workflow_dispatch:   # 수동 실행 버튼

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: 코드 가져오기
        uses: actions/checkout@v4

      - name: 파이썬 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 라이브러리 설치
        run: pip install requests pandas numpy

      - name: 스캔 실행 (일봉 + 60분 두 트랙)
        env:
          LS_APP_KEY: ${{ secrets.LS_APP_KEY }}
          LS_APP_SECRET: ${{ secrets.LS_APP_SECRET }}
        run: python scan.py

      - name: 결과 저장 (커밋)
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add result_day.json result_60m.json stocks.json
          git commit -m "스캔 결과 업데이트 (두 트랙)" || echo "변경 없음"
          git push
