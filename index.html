<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOIN CHART — 작도 표시</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--navy:#1a3a5c;--orange:#e8743b;--green:#1d9e75;--red:#e24b4a;--blue:#378add;--purple:#7f77dd;--pink:#d4537e;--line:#e3e8ee;--muted:#8a98a8;--faint:#a8b3c0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;padding:18px 14px 60px;font-size:16px}
.wrap{max-width:940px;margin:0 auto}
header{display:flex;align-items:center;gap:11px;margin-bottom:18px}
.logo{width:40px;height:40px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
.ttl{font-size:22px;font-weight:800}.sub{font-size:13px;color:var(--muted);margin-top:2px}
.search-box{position:relative;margin-bottom:8px}
.search-box input{width:100%;height:52px;border:2px solid #d5dce4;border-radius:12px;padding:0 18px;font-size:17px;font-weight:600;outline:none}
.search-box input:focus{border-color:var(--navy)}
.ac{position:absolute;top:56px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;z-index:20;box-shadow:0 4px 16px rgba(26,58,92,.12);display:none}
.ac.show{display:block}
.ac-item{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-top:1px solid var(--line)}
.ac-item:first-child{border-top:none}.ac-item:hover{background:var(--bg)}
.ac-item .an{font-weight:800;font-size:16px}.ac-item .acode{font-size:14px;color:var(--faint);font-weight:600}
.ac-item .amk{margin-left:auto;font-size:12px;padding:3px 9px;border-radius:7px;background:#fff3e8;color:var(--orange);font-weight:700}
.hint{font-size:13px;color:var(--faint);margin-bottom:18px}
.result-head{display:flex;align-items:center;gap:10px;margin:20px 0 12px}
.result-head .rn{font-size:20px;font-weight:800}.result-head .rc{font-size:14px;color:var(--faint);font-weight:600}
.result-head .rp{margin-left:auto;font-size:19px;font-weight:800}
.risk-alert{display:flex;align-items:center;gap:9px;margin:0 0 12px;padding:11px 14px;border-radius:10px;background:#fcebeb;border:1px solid #f09595}
.risk-alert .ri{font-size:20px}.risk-alert .rt{font-size:14px;font-weight:700;color:#a32d2d}
.track{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px 12px 10px;margin-bottom:14px}
.track-title{font-size:16px;font-weight:800;margin:0 4px 8px;display:flex;align-items:center;gap:8px}
.track-title .badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:7px;background:var(--bg);color:var(--muted)}
.chart-host{position:relative}
.chart-host canvas{width:100%;height:400px;display:block;cursor:crosshair}
.linetip{position:absolute;display:none;padding:5px 9px;border-radius:6px;font-size:13px;font-weight:600;color:#fff;pointer-events:none;white-space:nowrap;z-index:5}
.hoverp{font-size:14px;font-weight:700;color:var(--navy);font-variant-numeric:tabular-nums;margin-left:auto}
.draws-info{margin:8px 4px 0;font-size:13px;color:#555;line-height:1.85}
.draws-info .di{padding:5px 0;border-top:1px dashed var(--line)}.draws-info .di:first-child{border-top:none}
.di .alive{color:var(--green);font-weight:700}.di .dead{color:var(--faint)}.di .v{font-weight:700;color:var(--navy)}.di .tg{color:var(--green);font-weight:700}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin:8px 4px 0;font-size:12px;color:#5a6b7d}
.legend i{display:inline-block;width:16px;height:3px;border-radius:2px;vertical-align:middle;margin-right:3px}
.placeholder_marker{}
.zoombar{display:flex;gap:6px;margin:0 4px 8px}
.zoombar button{font-size:13px;font-weight:700;padding:5px 12px;border:1px solid #d5dce4;border-radius:8px;background:#fff;color:var(--navy);cursor:pointer}
.zoombar button:hover{background:var(--bg)}
.zoombar button:active{transform:scale(.97)}
.loading,.empty{text-align:center;padding:50px;color:var(--muted)}
.note{font-size:13px;color:var(--muted);margin-top:18px;line-height:1.9}
</style>
</head>
<body>
<div class="wrap">
<header><div class="logo" onclick="goHome()" style="cursor:pointer">J</div><div onclick="goHome()" style="cursor:pointer"><div class="ttl">JOIN CHART</div><div class="sub">종목 작도 자동 표시 · 일봉 · 60분</div></div></header>
<div class="search-box">
  <input type="text" id="codeInput" placeholder="종목명 또는 코드 입력 (예: 클로봇 / 466100)" autocomplete="off">
  <div class="ac" id="acList"></div>
</div>
<div id="backbar" style="display:none;margin-bottom:14px"><button onclick="goHome()" style="font-size:14px;font-weight:700;padding:8px 16px;border:1px solid #d5dce4;border-radius:9px;background:#fff;color:var(--navy);cursor:pointer">← 뒤로 (검색으로)</button></div>
<div class="hint">코스피·코스닥 전체 종목. 이름 일부나 코드를 입력하면 후보가 뜹니다. 마우스를 차트에 올리면 가격·날짜가 크게, 선 위에 올리면 그 선의 가격이 표시됩니다.</div>
<div id="result"></div>
<div class="note">
  작도 = 2일선(검정) 기준 · <span style="color:var(--red);font-weight:700">빨강</span> 급격하락 + <span style="color:var(--blue);font-weight:700">파랑</span> 완만하락 → <span style="color:var(--purple);font-weight:700">교차점</span>(1차) · <span style="color:var(--green);font-weight:700">녹색</span> 상승선(2차 목표가)<br>
  <span style="color:var(--pink);font-weight:700">분홍 하방선</span> = 반대 작도(하락 위험) · 최근 작도 5개 표시 · 차트 해석 보조용이며 매매 판단은 본인 책임입니다.
</div>
</div>
<script>
let STOCKS=[], CHARTS={};
fetch('stocks.json?t='+Date.now()).then(r=>r.json()).then(s=>STOCKS=s||[]).catch(()=>STOCKS=[]);
const inp=document.getElementById('codeInput'), ac=document.getElementById('acList');
inp.addEventListener('input',()=>{
  const q=inp.value.trim().toLowerCase();
  if(!q){ac.classList.remove('show');return;}
  const hit=STOCKS.filter(s=>s.code.includes(q)||(s.name&&s.name.toLowerCase().includes(q))).slice(0,7);
  if(!hit.length){ac.classList.remove('show');return;}
  ac.innerHTML=hit.map(s=>`<div class="ac-item" onclick="pick('${s.code}','${(s.name||'').replace(/'/g,'')}')"><span class="an">${s.name}</span><span class="acode">${s.code}</span><span class="amk">${s.market}</span></div>`).join('');
  ac.classList.add('show');
});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'){ac.classList.remove('show');
  const q=inp.value.trim();
  const m=q.match(/(\d{6})/);
  if(m){go(m[1]);return;}
  // 이름으로 정확/부분 매칭
  const ql=q.toLowerCase();
  let hit=STOCKS.find(s=>s.name&&s.name.toLowerCase()===ql) || STOCKS.find(s=>s.name&&s.name.toLowerCase().includes(ql));
  if(hit){pick(hit.code,hit.name);}
}});
document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))ac.classList.remove('show');});
function pick(code,name){inp.value=name+' ('+code+')';ac.classList.remove('show');go(code);}
function goHome(){document.getElementById('result').innerHTML='';document.getElementById('backbar').style.display='none';inp.value='';inp.focus();window.scrollTo(0,0);}

async function go(code){
  const box=document.getElementById('result');
  document.getElementById('backbar').style.display='block';
  box.innerHTML='<div class="loading">일봉·60분 작도 그리는 중...</div>';
  CHARTS={};
  try{
    const x=await fetch('/api/analyze?code='+code).then(r=>r.json());
    if(x.error){box.innerHTML='<div class="empty">'+x.error+'</div>';return;}
    render(x);
  }catch(e){box.innerHTML='<div class="empty">분석 실패. 잠시 후 다시 시도하세요.</div>';}
}
function render(x){
  const box=document.getElementById('result');
  const dayRisk=x.일봉&&x.일봉.risk_on, m60Risk=x['60분']&&x['60분'].risk_on;
  const src=(x.일봉&&x.일봉.risk_src)||'';
  let html=`<div class="result-head"><span class="rn">${x.종목명||''}</span><span class="rc">${x.종목코드} · ${x.시장||''}</span><span class="rp">${(x.일봉&&x.일봉.cur?x.일봉.cur.toLocaleString():'')}원</span></div>`;
  if(dayRisk||m60Risk){
    let where = src==='60분'?'60분봉에서 감지':(src==='과거'?'과거 구간에서 감지':'감지됨');
    html+=`<div class="risk-alert"><span class="ri">⚠️</span><span class="rt">하락 위험 신호 — 반대 작도 ${where} (하방 교차점까지 떨어질 가능성)</span></div>`;
  }
  html+=track('📅 일봉','스윙','day',x.일봉);
  html+=track('⏱️ 60분','데이트레이딩','m60',x['60분']);
  box.innerHTML=html;
  if(x.일봉&&x.일봉.chart) setTimeout(()=>mkChart('day',x.일봉),50);
  if(x['60분']&&x['60분'].chart) setTimeout(()=>mkChart('m60',x['60분']),100);
}
function track(title,sub,key,data){
  if(!data||data.error||!data.chart) return `<div class="track"><div class="track-title">${title} <span class="badge">${(data&&data.error)||'데이터 없음'}</span></div></div>`;
  const nd=data.draws.length, alive=data.draws.filter(d=>d.alive).length;
  let info='';
  data.draws.forEach((d,i)=>{
    info+=`<div class="di"><span class="${d.alive?'alive':'dead'}">${d.alive?'● 살아있음':'○ 지남'}</span> 작도${i+1} · 매수 <span class="v">${d.ep.toLocaleString()}</span> · 1차 <span class="v">${d.yc.toLocaleString()}</span></div>`;
  });
  return `<div class="track">
    <div class="track-title">${title} <span class="badge">${sub}</span> <span class="badge">작도 ${nd} · 살아있음 ${alive}</span><span class="hoverp" id="hp-${key}">—</span></div>
    <div class="zoombar"><button id="zin-${key}">+ 확대</button><button id="zout-${key}">− 축소</button><button id="zall-${key}">전체</button></div>
    <div class="chart-host"><canvas id="cv-${key}"></canvas><div class="linetip" id="tip-${key}"></div></div>
    <div class="legend"><span><i style="background:#000"></i>2일선</span><span><i style="background:#e24b4a"></i>하락A</span><span><i style="background:#378add"></i>하락B</span><span><i style="background:#7f77dd"></i>교차점</span><span><i style="background:#1d9e75"></i>상승선</span><span><i style="background:#d4537e"></i>하방위험</span></div>
    <div class="draws-info">${info||'작도 구조 없음'}</div>
  </div>`;
}
function mkChart(key,data){
  const cv=document.getElementById('cv-'+key), tip=document.getElementById('tip-'+key), hp=document.getElementById('hp-'+key);
  const ch=data.chart, n=ch.length, draws=data.draws||[], risks=data.risks||[];
  const c=ch.map(r=>r.c), ma2=ch.map(r=>r.m2);
  const DPR=window.devicePixelRatio||1; const padR=66,padL=8,padT=12,padB=30;
  let W,H,plot, viewS=0, viewE=n-1;  // 보이는 봉 범위(확대축소)
  // 초기 뷰: 과거 위험(view_start) 있으면 거기부터, 없으면 최근 5개 작도+위험 구간
  {let cand=[];draws.forEach(d=>cand.push(d.A_t1));risks.forEach(r=>{if(!r.price_only&&r.A_t1!=null)cand.push(r.A_t1);});
   if(data.view_start!=null) cand.push(data.view_start);
   if(cand.length){let mn=Math.min(...cand);viewS=Math.max(0,mn-4);viewE=n-1;if(viewE-viewS<12)viewS=Math.max(0,viewE-12);}}
  function lay(){W=cv.clientWidth;H=cv.clientHeight;cv.width=W*DPR;cv.height=H*DPR;cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
    const vis=ch.slice(viewS,viewE+1);
    let lo=Math.min(...vis.map(r=>r.l)), hi=Math.max(...vis.map(r=>r.h));
    risks.forEach(r=>{lo=Math.min(lo,r.yc);});
    lo*=0.99;hi*=1.01; plot={lo,hi,x0:padL,x1:W-padR,y0:padT,y1:H-padB};}
  const span=()=>(viewE-viewS+1);
  const xOf=i=>plot.x0+(i-viewS+0.5)/span()*(plot.x1-plot.x0);
  const yOf=v=>plot.y1-(v-plot.lo)/(plot.hi-plot.lo)*(plot.y1-plot.y0);
  const vOf=y=>plot.lo+(plot.y1-y)/(plot.y1-plot.y0)*(plot.hi-plot.lo);
  const iOfX=x=>Math.round(viewS+(x-plot.x0)/(plot.x1-plot.x0)*span()-0.5);
  const FF=()=>getComputedStyle(document.body).fontFamily;
  function seg(ctx,i0,y0,i1,y1,color,w,dash){if(i1<viewS||i0>viewE)return;ctx.strokeStyle=color;ctx.lineWidth=w;ctx.setLineDash(dash||[]);ctx.beginPath();ctx.moveTo(xOf(i0),yOf(y0));ctx.lineTo(xOf(i1),yOf(y1));ctx.stroke();ctx.setLineDash([]);}
  function draw(mx,my){
    const ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);ctx.font='12px '+FF();
    ctx.strokeStyle='#eef1f5';ctx.lineWidth=1;ctx.fillStyle='#9aa6b2';ctx.textAlign='left';
    for(let g=0;g<=4;g++){const v=plot.lo+(plot.hi-plot.lo)*g/4,y=yOf(v);ctx.beginPath();ctx.moveTo(plot.x0,y);ctx.lineTo(plot.x1,y);ctx.stroke();ctx.fillText(Math.round(v).toLocaleString(),plot.x1+6,y+4);}
    // X축 날짜 라벨 (상시)
    ctx.fillStyle='#5a6b7d';ctx.font='12px '+FF();ctx.textAlign='center';
    const ticks=6, sp0=span();
    for(let t=0;t<ticks;t++){const idx=viewS+Math.round((sp0-1)*t/(ticks-1));if(!ch[idx])continue;
      const x=xOf(idx);ctx.fillText(ch[idx].d, x, plot.y1+15);
      ctx.strokeStyle='#eef1f5';ctx.beginPath();ctx.moveTo(x,plot.y0);ctx.lineTo(x,plot.y1);ctx.stroke();}
    ctx.textAlign='left';
    const cw=Math.max(2,(plot.x1-plot.x0)/span()*0.62);
    for(let i=viewS;i<=viewE;i++){const r=ch[i],x=xOf(i),u=r.c>=r.o;
      ctx.strokeStyle=u?'#e24b4a':'#378add';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,yOf(r.h));ctx.lineTo(x,yOf(r.l));ctx.stroke();
      ctx.fillStyle=u?'rgba(226,75,74,.55)':'rgba(55,138,221,.55)';
      const yo=yOf(r.o),yc=yOf(r.c);ctx.fillRect(x-cw/2,Math.min(yo,yc),cw,Math.max(1.5,Math.abs(yc-yo)));
      ctx.strokeStyle=u?'rgba(226,75,74,.8)':'rgba(55,138,221,.8)';ctx.lineWidth=1;ctx.strokeRect(x-cw/2,Math.min(yo,yc),cw,Math.max(1.5,Math.abs(yc-yo)));}
    ctx.strokeStyle='#111';ctx.lineWidth=1.8;ctx.beginPath();let st=false;
    for(let i=viewS;i<=viewE;i++){if(ma2[i]==null)continue;const x=xOf(i),y=yOf(ma2[i]);st?ctx.lineTo(x,y):ctx.moveTo(x,y);st=true;}ctx.stroke();
    risks.forEach(d=>{
      if(!d.price_only){
        seg(ctx,d.A_t1-1,ma2[d.A_t1-1]||d.A_y1,d.A_t1,d.A_y1,'#d4537e',3);
        seg(ctx,d.B_t1,d.B_y1,Math.round(d.xc),d.yc,'rgba(212,83,126,.6)',1.2,[4,3]);
      }
      ctx.strokeStyle='rgba(212,83,126,.85)';ctx.lineWidth=1.4;ctx.setLineDash(d.price_only?[6,4]:[]);ctx.beginPath();ctx.moveTo(plot.x0,yOf(d.yc));ctx.lineTo(plot.x1,yOf(d.yc));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#d4537e';ctx.fillRect(plot.x1-2,yOf(d.yc)-9,64,18);ctx.fillStyle='#fff';ctx.font='11px '+FF();ctx.fillText('위험 '+Math.round(d.yc).toLocaleString(),plot.x1+2,yOf(d.yc)+3);});
    draws.forEach(d=>{const al=d.alive?1:.32;
      seg(ctx,d.A_t1-1,ma2[d.A_t1-1]||d.A_y1,d.A_t1,d.A_y1,'rgba(226,75,74,'+al+')',3);
      seg(ctx,d.A_t1,d.A_y1,Math.round(d.xc),d.yc,'rgba(226,75,74,'+(al*.5)+')',1,[4,3]);
      seg(ctx,d.B_t1-1,ma2[d.B_t1-1]||d.B_y1,d.B_t1,d.B_y1,'rgba(55,138,221,'+al+')',3);
      seg(ctx,d.B_t1,d.B_y1,Math.round(d.xc),d.yc,'rgba(55,138,221,'+(al*.5)+')',1,[4,3]);
      ctx.strokeStyle='rgba(127,119,221,'+al+')';ctx.lineWidth=1.3;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(plot.x0,yOf(d.yc));ctx.lineTo(plot.x1,yOf(d.yc));ctx.stroke();
      const gs=(d.M_s2!=null&&d.M_s2>0)?d.M_s2:d.M_slope;
      if(d.M_k!=null&&d.M_s1!=null){seg(ctx,d.M_t0,d.M_y0,d.M_k,d.M_ky,'rgba(29,158,117,'+al+')',3);seg(ctx,d.M_k,d.M_ky,d.M_t1,d.M_y1,'rgba(29,158,117,'+al+')',3);}
      else seg(ctx,d.M_t0,d.M_y0,d.M_t1,d.M_y1,'rgba(29,158,117,'+al+')',3);
      seg(ctx,d.M_t1,d.M_y1,n-1,d.M_y1+gs*(n-1-d.M_t1),'rgba(29,158,117,'+(al*.7)+')',1.6,[5,3]);
      if(d.entry>=viewS&&d.entry<=viewE){ctx.fillStyle=d.alive?'#e8743b':'rgba(232,116,59,.4)';ctx.beginPath();const ex=xOf(d.entry),ey=yOf(c[d.entry]);ctx.moveTo(ex,ey-7);ctx.lineTo(ex-6,ey+5);ctx.lineTo(ex+6,ey+5);ctx.closePath();ctx.fill();}
    });
    if(mx!=null&&mx>=plot.x0&&mx<=plot.x1&&my!=null){
      ctx.strokeStyle='rgba(26,58,92,.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(mx,plot.y0);ctx.lineTo(mx,plot.y1);ctx.stroke();ctx.beginPath();ctx.moveTo(plot.x0,my);ctx.lineTo(plot.x1,my);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#1a3a5c';ctx.fillRect(plot.x1,my-11,padR-2,22);ctx.fillStyle='#fff';ctx.font='13px '+FF();ctx.textAlign='left';ctx.fillText(Math.round(vOf(my)).toLocaleString(),plot.x1+5,my+4);
      const idx=iOfX(mx);
      if(ch[idx]){const lbl=ch[idx].d;const tw=ctx.measureText(lbl).width+12;ctx.fillStyle='#1a3a5c';ctx.fillRect(mx-tw/2,plot.y1+2,tw,18);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(lbl,mx,plot.y1+14);hp.textContent=lbl+'  '+ch[idx].c.toLocaleString()+'원';}
    }
  }
  let lastMx=null,lastMy=null;
  function hover(e){const r=cv.getBoundingClientRect();lastMx=e.clientX-r.left;lastMy=e.clientY-r.top;draw(lastMx,lastMy);tip.style.display='none';
    draws.forEach(d=>{const gs=(d.M_s2!=null&&d.M_s2>0)?d.M_s2:d.M_slope;
      const per=(plot.x1-plot.x0)/span(), slPx=-gs/(plot.hi-plot.lo)*(plot.y1-plot.y0)/per;
      const ly=yOf(d.M_y1)+slPx*((lastMx-xOf(d.M_t1))/per);
      if(lastMx>=xOf(d.M_t0)&&Math.abs(lastMy-ly)<7){tip.style.display='block';tip.style.background='#1d9e75';tip.textContent='상승선 '+Math.round(vOf(ly)).toLocaleString();tip.style.left=Math.min(lastMx+12,W-tip.offsetWidth-10)+'px';tip.style.top=(ly-28)+'px';}
      if(Math.abs(lastMy-yOf(d.yc))<6){tip.style.display='block';tip.style.background='#7f77dd';tip.textContent='교차점 '+d.yc.toLocaleString();tip.style.left=Math.min(lastMx+12,W-90)+'px';tip.style.top=(yOf(d.yc)-28)+'px';}});
    risks.forEach(d=>{if(Math.abs(lastMy-yOf(d.yc))<6){tip.style.display='block';tip.style.background='#d4537e';tip.textContent='하방 위험 '+d.yc.toLocaleString();tip.style.left=Math.min(lastMx+12,W-110)+'px';tip.style.top=(yOf(d.yc)-28)+'px';}});
  }
  cv.addEventListener('mousemove',hover);
  cv.addEventListener('mouseleave',()=>{lastMx=lastMy=null;draw(null,null);tip.style.display='none';hp.textContent='—';});
  // 확대축소: 마우스 휠
  cv.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left;
    const center=iOfX(mx),sp=span();const ns=Math.max(12,Math.min(n,Math.round(sp*(e.deltaY>0?1.15:0.87))));
    const ratio=(center-viewS)/sp;let s=Math.round(center-ns*ratio);let en=s+ns-1;
    if(s<0){s=0;en=ns-1;} if(en>n-1){en=n-1;s=Math.max(0,en-ns+1);}
    viewS=s;viewE=en;lay();draw(lastMx,lastMy);},{passive:false});
  // 드래그 이동(팬)
  let drag=false,dragX=0,dragVS=0;
  cv.addEventListener('mousedown',e=>{drag=true;dragX=e.clientX;dragVS=viewS;cv.style.cursor='grabbing';});
  window.addEventListener('mouseup',()=>{drag=false;cv.style.cursor='crosshair';});
  cv.addEventListener('mousemove',e=>{if(!drag)return;const dx=e.clientX-dragX,per=(plot.x1-plot.x0)/span();
    let shift=Math.round(-dx/per);let s=dragVS+shift,sp=span();if(s<0)s=0;if(s+sp>n)s=n-sp;viewS=s;viewE=s+sp-1;lay();draw(lastMx,lastMy);});
  // 확대축소 버튼
  document.getElementById('zin-'+key).onclick=()=>{const sp=span(),ns=Math.max(12,Math.round(sp*0.7)),mid=Math.round((viewS+viewE)/2);viewS=Math.max(0,mid-Math.round(ns/2));viewE=Math.min(n-1,viewS+ns-1);lay();draw(null,null);};
  document.getElementById('zout-'+key).onclick=()=>{const sp=span(),ns=Math.min(n,Math.round(sp*1.4)),mid=Math.round((viewS+viewE)/2);viewS=Math.max(0,mid-Math.round(ns/2));viewE=Math.min(n-1,viewS+ns-1);if(viewE-viewS+1<ns)viewS=Math.max(0,viewE-ns+1);lay();draw(null,null);};
  document.getElementById('zall-'+key).onclick=()=>{viewS=0;viewE=n-1;lay();draw(null,null);};
  lay();draw(null,null);
  window.addEventListener('resize',()=>{lay();draw(null,null);});
}

</script>
</body>
