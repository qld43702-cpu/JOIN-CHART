<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOIN CHART</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f4f6f8;--card:#fff;--navy:#1a3a5c;--orange:#e8743b;--line:#e3e8ee;--muted:#8a98a8;--faint:#a8b3c0;--sh:0 1px 4px rgba(26,58,92,0.07)}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;padding:16px 14px 60px}
.wrap{max-width:860px;margin:0 auto}
header{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.logo{width:38px;height:38px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:18px}
.ttl{font-size:19px;font-weight:800;letter-spacing:-0.3px}
.sub{font-size:11px;color:var(--muted);margin-top:1px}
.upd{margin-left:auto;font-size:11px;color:var(--muted)}
.summary{display:flex;gap:8px;margin-bottom:14px}
.stat{flex:1;background:var(--card);border-radius:12px;padding:12px 10px;box-shadow:var(--sh)}
.stat .n{font-size:22px;font-weight:800}
.stat .l{font-size:11px;color:var(--muted);margin-top:2px}
.s3 .n{color:var(--orange)}
.tabs{display:flex;gap:7px;margin-bottom:12px;flex-wrap:wrap}
.tab{padding:7px 14px;border-radius:999px;background:var(--card);color:var(--muted);font-size:12px;border:1px solid var(--line);cursor:pointer;transition:all .15s}
.tab.active{background:var(--navy);color:#fff;border-color:var(--navy);font-weight:600}
.list{display:flex;flex-direction:column;gap:8px}
.item{background:var(--card);border-radius:12px;box-shadow:var(--sh);overflow:hidden}
.row{display:flex;align-items:center;padding:14px;cursor:pointer;transition:background .1s;user-select:none}
.row:hover{background:#fafbfc}
.grade{width:48px;font-size:13px;letter-spacing:1px}
.g3{color:var(--orange)}.g2{color:var(--navy)}.g1{color:#4a9edb}.g0{color:var(--faint)}
.info{flex:1;min-width:0}
.name{font-weight:700}
.code{font-size:11px;color:var(--faint);margin-left:5px}
.meta{font-size:11px;color:var(--faint);margin-top:2px}
.right{text-align:right}
.price{font-weight:700;font-variant-numeric:tabular-nums}
.ind{font-size:11px;margin-top:2px}
.on{color:var(--orange)}.off{color:#cdd5de}
.arr{font-size:14px;color:var(--faint);margin-left:8px;transition:transform .2s}
.arr.open{transform:rotate(180deg)}
.detail{display:none;padding:0 14px 14px}
.detail.show{display:block}
.chart-wrap{position:relative;height:240px;margin-bottom:12px}
.signals{display:flex;gap:8px;flex-wrap:wrap}
.sig{flex:1;min-width:80px;background:var(--bg);border-radius:10px;padding:10px;text-align:center}
.sig .sv{font-size:16px;font-weight:700}
.sig .sl{font-size:11px;color:var(--muted);margin-top:2px}
.buy-sig{color:#e8743b}.sell-sig{color:#4a9edb}
.note{font-size:11px;color:var(--faint);margin-top:14px;line-height:1.7}
.loading{text-align:center;padding:60px;color:var(--muted)}
.empty{text-align:center;padding:40px;color:var(--muted)}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo">J</div>
  <div><div class="ttl">JOIN CHART</div><div class="sub">작도 신호 자동 스캔</div></div>
  <div class="upd" id="upd">불러오는 중...</div>
</header>
<div class="summary" id="summary"></div>
<div class="tabs">
  <div class="tab active" data-f="best">매수후보 ★★↑</div>
  <div class="tab" data-f="all">전체</div>
  <div class="tab" data-f="kospi">코스피</div>
  <div class="tab" data-f="kosdaq">코스닥</div>
</div>
<div id="content"><div class="loading">불러오는 중...</div></div>
<div class="note">
  ★★★ 추세+MACD+완만도0.7↓ · ★★ 추세+MACD · ★ 추세만<br>
  ▲ 매수시점 = 완만한 하락 종료 후 진입 · ▼ 매도시점 = 상승각도선 이탈<br>
  매일 장 마감 후 자동 갱신 · 투자 판단과 책임은 본인에게 있습니다.
</div>
</div>

<script>
let DATA=null, filter='best', charts={};

async function load(){
  try{
    const res=await fetch('result.json?t='+Date.now());
    DATA=await res.json();
    document.getElementById('upd').textContent='갱신 '+DATA.업데이트;
    renderSummary(); render();
  }catch(e){
    document.getElementById('content').innerHTML='<div class="empty">아직 데이터가 없습니다.<br>첫 스캔 후 표시됩니다.</div>';
    document.getElementById('upd').textContent='';
  }
}

function renderSummary(){
  const r=DATA.결과;
  const c=g=>r.filter(x=>x.추천도===g).length;
  document.getElementById('summary').innerHTML=`
    <div class="stat s3"><div class="n">${c('★★★')}</div><div class="l">★★★ 최우선</div></div>
    <div class="stat"><div class="n">${c('★★')}</div><div class="l">★★ 우량</div></div>
    <div class="stat"><div class="n">${c('★')}</div><div class="l">★ 관심</div></div>
    <div class="stat"><div class="n">${r.length}</div><div class="l">전체</div></div>`;
}

function gc(g){return g==='★★★'?'g3':g==='★★'?'g2':g==='★'?'g1':'g0';}

function render(){
  let rows=DATA.결과;
  if(filter==='best') rows=rows.filter(x=>x.추천도==='★★★'||x.추천도==='★★');
  else if(filter==='kospi') rows=rows.filter(x=>x.시장==='코스피');
  else if(filter==='kosdaq') rows=rows.filter(x=>x.시장==='코스닥');
  if(!rows.length){document.getElementById('content').innerHTML='<div class="empty">해당 조건 종목 없음</div>';return;}
  
  let h='<div class="list">';
  rows.forEach((x,i)=>{
    const idx=DATA.결과.indexOf(x);
    h+=`<div class="item" id="item-${idx}">
      <div class="row" onclick="toggle(${idx})">
        <div class="grade ${gc(x.추천도)}">${x.추천도}</div>
        <div class="info">
          <span class="name">${x.종목명}</span><span class="code">${x.종목코드}</span>
          <div class="meta">${x.시장} · 완만도 ${x.완만도}</div>
        </div>
        <div class="right">
          <div class="price">${x.현재가.toLocaleString()}</div>
          <div class="ind">추세<span class="${x['20일선위']?'on':'off'}">●</span> MACD<span class="${x.MACD양전?'on':'off'}">●</span></div>
        </div>
        <span class="arr" id="arr-${idx}">▾</span>
      </div>
      <div class="detail" id="detail-${idx}">
        <div class="chart-wrap"><canvas id="canvas-${idx}"></canvas></div>
        <div class="signals">
          <div class="sig"><div class="sv buy-sig">▲ 매수</div><div class="sl">${x.drawing&&x.drawing.entry_x!==null?'작도 완성 다음봉':'—'}</div></div>
          <div class="sig"><div class="sv sell-sig">▼ 매도</div><div class="sl">${x.drawing&&x.drawing.sell_x!==null?'상승각도선 이탈':'홀딩중'}</div></div>
          <div class="sig"><div class="sv">${x.완만도}</div><div class="sl">완만도</div></div>
          <div class="sig"><div class="sv">${x.추천도}</div><div class="sl">등급</div></div>
        </div>
      </div>
    </div>`;
  });
  h+='</div>';
  document.getElementById('content').innerHTML=h;
}

function toggle(idx){
  const det=document.getElementById('detail-'+idx);
  const arr=document.getElementById('arr-'+idx);
  const isOpen=det.classList.contains('show');
  det.classList.toggle('show');
  arr.classList.toggle('open');
  if(!isOpen && !charts[idx]){
    setTimeout(()=>drawChart(idx),50);
  }
}

function drawChart(idx){
  const x=DATA.결과[idx];
  if(!x.chart||!x.drawing) return;
  const d=x.drawing, ch=x.chart;
  const labels=ch.map(r=>r.d);
  const closes=ch.map(r=>r.c);
  const ma2=ch.map(r=>r.m2);
  const ma5=ch.map(r=>r.m5);
  const n=ch.length;

  // 작도선 데이터 생성
  function makeLine(x0,y0,x1,y1){
    const arr=new Array(n).fill(null);
    if(x0<0||x1<0||x0>=n||x1>=n) return arr;
    const slope=(y1-y0)/(x1-x0||1);
    for(let i=Math.max(0,Math.min(x0,x1));i<=Math.min(n-1,Math.max(x0,x1));i++){
      arr[i]=Math.round(y0+slope*(i-x0));
    }
    return arr;
  }

  // 교차점선 (수평)
  const crossLine=new Array(n).fill(null);
  if(d.xc>=0&&d.xc<n) crossLine[Math.round(d.xc)]=Math.round(d.yc);

  // 상승각도 연장선
  const upLine=new Array(n).fill(null);
  for(let i=d.up_x0;i<n;i++){
    upLine[i]=Math.round(d.up_y0+d.up_slope*(i-d.up_x0));
  }

  // 매수/매도 포인트
  const buyPt=new Array(n).fill(null);
  const sellPt=new Array(n).fill(null);
  if(d.entry_x>=0&&d.entry_x<n) buyPt[d.entry_x]=closes[d.entry_x];
  if(d.sell_x&&d.sell_x>=0&&d.sell_x<n) sellPt[d.sell_x]=closes[d.sell_x];

  const ctx=document.getElementById('canvas-'+idx).getContext('2d');
  charts[idx]=new Chart(ctx,{
    type:'line',
    data:{
      labels,
      datasets:[
        {label:'종가',data:closes,borderColor:'#1a3a5c',borderWidth:1.5,pointRadius:0,tension:0.1,fill:false,order:5},
        {label:'2일선',data:ma2,borderColor:'#333',borderWidth:1.2,pointRadius:0,tension:0.1,fill:false,borderDash:[],order:4},
        {label:'5일선',data:ma5,borderColor:'#e8743b',borderWidth:1,pointRadius:0,tension:0.1,fill:false,borderDash:[3,3],order:4},
        {label:'가파른하락',data:makeLine(d.A_x0,d.A_y0,d.A_x1,d.A_y1),borderColor:'#ff4444',borderWidth:2,pointRadius:0,fill:false,borderDash:[],order:3},
        {label:'완만한하락',data:makeLine(d.B_x0,d.B_y0,d.B_x1,d.B_y1),borderColor:'#4488ff',borderWidth:2,pointRadius:0,fill:false,borderDash:[],order:3},
        {label:'교차가로선',data:new Array(n).fill(Math.round(d.yc)),borderColor:'#e8743b',borderWidth:1,pointRadius:0,fill:false,borderDash:[4,4],order:2},
        {label:'상승각도',data:upLine,borderColor:'#22aa66',borderWidth:1.5,pointRadius:0,fill:false,borderDash:[5,3],order:2},
        {label:'매수',data:buyPt,type:'scatter',pointStyle:'triangle',pointRadius:10,backgroundColor:'#e8743b',borderColor:'#e8743b',order:1},
        {label:'매도',data:sellPt,type:'scatter',pointStyle:'triangle',rotation:180,pointRadius:10,backgroundColor:'#4488ff',borderColor:'#4488ff',order:1},
      ]
    },
    options:{
      responsive:true,maintainAspectRatio:false,
      interaction:{mode:'index',intersect:false},
      plugins:{
        legend:{display:false},
        tooltip:{
          callbacks:{
            label:ctx=>{
              if(ctx.dataset.label==='매수') return '▲ 매수시점';
              if(ctx.dataset.label==='매도') return '▼ 매도시점';
              if(ctx.dataset.label==='교차가로선'||ctx.dataset.label==='상승각도') return null;
              return ctx.dataset.label+': '+(ctx.raw?ctx.raw.toLocaleString():'');
            }
          }
        }
      },
      scales:{
        x:{grid:{color:'#f0f2f5'},ticks:{font:{size:10},color:'#a8b3c0',maxTicksLimit:8}},
        y:{position:'right',grid:{color:'#f0f2f5'},ticks:{font:{size:10},color:'#a8b3c0',callback:v=>v.toLocaleString()}}
      }
    }
  });
}

document.querySelectorAll('.tab').forEach(t=>t.addEventListener('click',()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));
  t.classList.add('active'); filter=t.dataset.f;
  Object.values(charts).forEach(c=>c.destroy()); charts={};
  render();
}));

load();
</script>
</body>
</html>
