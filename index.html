<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOIN CHART — 작도 표시</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{--bg:#f4f6f8;--card:#fff;--navy:#1a3a5c;--orange:#e8743b;--green:#22aa66;--red:#cc3344;--line:#e3e8ee;--muted:#8a98a8;--faint:#a8b3c0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;padding:18px 14px 60px;font-size:16px}
.wrap{max-width:920px;margin:0 auto}
header{display:flex;align-items:center;gap:11px;margin-bottom:20px}
.logo{width:40px;height:40px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px}
.ttl{font-size:22px;font-weight:800}.sub{font-size:13px;color:var(--muted);margin-top:2px}
.search-box{position:relative;margin-bottom:8px}
.search-box input{width:100%;height:52px;border:2px solid #d5dce4;border-radius:12px;padding:0 18px;font-size:17px;font-weight:600;outline:none}
.search-box input:focus{border-color:var(--navy)}
.ac{position:absolute;top:56px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;z-index:10;box-shadow:0 4px 16px rgba(26,58,92,.12);display:none}
.ac.show{display:block}
.ac-item{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-top:1px solid var(--line)}
.ac-item:first-child{border-top:none}.ac-item:hover{background:var(--bg)}
.ac-item .an{font-weight:800;font-size:16px}.ac-item .acode{font-size:14px;color:var(--faint);font-weight:600}
.ac-item .amk{margin-left:auto;font-size:12px;padding:3px 9px;border-radius:7px;background:#fff3e8;color:var(--orange);font-weight:700}
.hint{font-size:13px;color:var(--faint);margin-bottom:18px}
.result-head{display:flex;align-items:center;gap:10px;margin:20px 0 14px}
.result-head .rn{font-size:20px;font-weight:800}
.result-head .rc{font-size:14px;color:var(--faint);font-weight:600}
.result-head .rp{margin-left:auto;font-size:18px;font-weight:800}
.track{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:16px;margin-bottom:14px}
.track-title{font-size:16px;font-weight:800;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.track-title .badge{font-size:12px;font-weight:700;padding:3px 10px;border-radius:7px;background:var(--bg);color:var(--muted)}
.chart-wrap{position:relative;height:420px}
.draws-info{margin-top:12px;font-size:13px;color:#555;line-height:1.8}
.draws-info .di{padding:6px 0;border-top:1px dashed var(--line)}
.draws-info .di:first-child{border-top:none}
.di .alive{color:var(--green);font-weight:700}
.di .dead{color:var(--faint)}
.di .v{font-weight:700;color:var(--navy)}
.loading,.empty{text-align:center;padding:50px;color:var(--muted)}
.note{font-size:13px;color:var(--muted);margin-top:18px;line-height:1.9}
</style>
</head>
<body>
<div class="wrap">
<header>
  <div class="logo">J</div>
  <div><div class="ttl">JOIN CHART</div><div class="sub">종목 작도 자동 표시 · 일봉 · 60분</div></div>
</header>

<div class="search-box">
  <input type="text" id="codeInput" placeholder="종목명 또는 코드 입력 (예: 클로봇 / 466100)" autocomplete="off">
  <div class="ac" id="acList"></div>
</div>
<div class="hint">이름 일부나 코드를 입력하면 후보가 뜹니다. 선택하면 일봉·60분 두 트랙에 작도(하락-상승파동-하락, 교차점·녹색 상승선)를 자동으로 다 그립니다.</div>

<div id="result"></div>

<div class="note">
  작도 = 2일선(검정) 기준 · 빨강 급격하락 + 파랑 완만하락 → 교차점(보라, 1차 기준선) · 녹색 = 상승각도선<br>
  교차점이 매수가 위면 <span style="color:var(--green);font-weight:700">살아있는 작도</span>, 아래면 <span style="color:var(--faint)">지난 작도</span> · 작도는 차트 해석 보조용이며 매매 판단은 본인 책임입니다.
</div>
</div>

<script>
let STOCKS=[], charts={};

fetch('stocks.json?t='+Date.now()).then(r=>r.json()).then(s=>STOCKS=s||[]).catch(()=>STOCKS=[]);

const inp=document.getElementById('codeInput'), ac=document.getElementById('acList');
inp.addEventListener('input',()=>{
  const q=inp.value.trim().toLowerCase();
  if(!q){ac.classList.remove('show');return;}
  const hit=STOCKS.filter(s=>s.code.includes(q)||(s.name&&s.name.toLowerCase().includes(q))).slice(0,7);
  if(!hit.length){ac.classList.remove('show');return;}
  ac.innerHTML=hit.map(s=>`<div class="ac-item" onclick="pick('${s.code}','${s.name.replace(/'/g,"")}')"><span class="an">${s.name}</span><span class="acode">${s.code}</span><span class="amk">${s.market}</span></div>`).join('');
  ac.classList.add('show');
});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'){ac.classList.remove('show');const m=inp.value.match(/\d{6}/);if(m)go(m[0]);}});
document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))ac.classList.remove('show');});
function pick(code,name){inp.value=name+' ('+code+')';ac.classList.remove('show');go(code);}

async function go(code){
  const box=document.getElementById('result');
  box.innerHTML='<div class="loading">일봉·60분 작도 그리는 중...</div>';
  Object.values(charts).forEach(c=>c&&c.destroy()); charts={};
  try{
    const x=await fetch('/api/analyze?code='+code).then(r=>r.json());
    if(x.error){box.innerHTML='<div class="empty">'+x.error+'</div>';return;}
    render(x);
  }catch(e){box.innerHTML='<div class="empty">분석 실패. 잠시 후 다시 시도하세요.</div>';}
}

function render(x){
  const box=document.getElementById('result');
  let html=`<div class="result-head"><span class="rn">${x.종목명||''}</span><span class="rc">${x.종목코드} · ${x.시장||''}</span><span class="rp">${(x.일봉&&x.일봉.cur?x.일봉.cur.toLocaleString():'')}</span></div>`;
  html+=trackBlock('📅 일봉','스윙 (며칠 단위)','day',x.일봉);
  html+=trackBlock('⏱️ 60분','데이트레이딩 (시간 단위)','m60',x['60분']);
  box.innerHTML=html;
  if(x.일봉&&x.일봉.chart) setTimeout(()=>drawChart('canvas-day',x.일봉),60);
  if(x['60분']&&x['60분'].chart) setTimeout(()=>drawChart('canvas-m60',x['60분']),120);
}

function trackBlock(title,sub,key,data){
  if(!data||data.error||!data.chart) return `<div class="track"><div class="track-title">${title} <span class="badge">${(data&&data.error)||'데이터 없음'}</span></div></div>`;
  const nd=data.draws.length, alive=data.draws.filter(d=>d.alive).length;
  let info='';
  data.draws.forEach((d,i)=>{
    const live=d.alive;
    info+=`<div class="di"><span class="${live?'alive':'dead'}">${live?'● 살아있음':'○ 지남'}</span> 
      작도${i+1} · 매수 <span class="v">${d.ep.toLocaleString()}</span> · 교차점(1차) <span class="v">${d.yc.toLocaleString()}</span> 
      (${((d.yc/d.ep-1)*100).toFixed(0)>0?'+':''}${((d.yc/d.ep-1)*100).toFixed(0)}%)</div>`;
  });
  return `<div class="track">
    <div class="track-title">${title} <span class="badge">${sub}</span> <span class="badge">작도 ${nd}개 · 살아있음 ${alive}</span></div>
    <div class="chart-wrap"><canvas id="canvas-${key}"></canvas></div>
    <div class="draws-info">${info||'작도 구조 없음'}</div>
  </div>`;
}

function drawChart(canvasId,data){
  const ch=data.chart, n=ch.length;
  const labels=ch.map(r=>r.d), closes=ch.map(r=>r.c), ma2=ch.map(r=>r.m2);
  const ds=[
    {label:'종가',data:closes,borderColor:'rgba(26,58,92,.35)',borderWidth:1,pointRadius:0,tension:.1},
    {label:'2일선',data:ma2,borderColor:'#000',borderWidth:2,pointRadius:0,tension:.1},
  ];
  // 작도 다수 그리기
  data.draws.forEach((d)=>{
    const alive=d.alive;
    const aA=alive?1:.3;
    // A 마지막하락 + 교차점 연장
    ds.push(seg(n,d.A_t1-1>=0?d.A_t1-1:d.A_t1, ma2[d.A_t1-1]||d.A_y1, d.A_t1, d.A_y1, '#ff2200', 3, aA));
    ds.push(seg(n,d.A_t1,d.A_y1, Math.round(d.xc), d.yc, 'rgba(255,34,0,.5)',1,aA,[3,3]));
    // B 마지막하락 + 교차점 연장
    ds.push(seg(n,d.B_t1-1>=0?d.B_t1-1:d.B_t1, ma2[d.B_t1-1]||d.B_y1, d.B_t1, d.B_y1, '#0066ff', 3, aA));
    ds.push(seg(n,d.B_t1,d.B_y1, Math.round(d.xc), d.yc, 'rgba(0,102,255,.5)',1,aA,[3,3]));
    // 교차점 수평선
    ds.push({label:'_h',data:new Array(n).fill(Math.round(d.yc)),borderColor:alive?'rgba(155,89,182,.7)':'rgba(155,89,182,.25)',borderWidth:1.3,pointRadius:0});
    // 교차점 마커
    const xp=new Array(n).fill(null); const xi=Math.max(0,Math.min(n-1,Math.round(d.xc))); xp[xi]=Math.round(d.yc);
    ds.push({label:'_x',data:xp,type:'scatter',pointStyle:'crossRot',pointRadius:8,borderColor:'#9b59b6',borderWidth:2,backgroundColor:'#9b59b6'});
    // 녹색 상승선 (두 갈래 or 한 갈래) + 연장
    if(d.M_k!==null && d.M_s1!==null && d.M_s2!==null){
      ds.push(seg(n,d.M_t0,d.M_y0,d.M_k,d.M_ky,'#22aa66',3,aA));
      ds.push(extend(n,d.M_k,d.M_ky,d.M_s1,'rgba(34,170,102,.55)',1.2,aA));
      ds.push(seg(n,d.M_k,d.M_ky,d.M_t1,d.M_y1,'#16a34a',3,aA));
      ds.push(extend(n,d.M_t1,d.M_y1,d.M_s2,'rgba(22,163,74,.6)',1.4,aA));
    } else {
      ds.push(seg(n,d.M_t0,d.M_y0,d.M_t1,d.M_y1,'#22aa66',3,aA));
      ds.push(extend(n,d.M_t1,d.M_y1,d.M_slope,'rgba(34,170,102,.6)',1.4,aA));
    }
    // 매수 마커
    const bp=new Array(n).fill(null); if(d.entry>=0&&d.entry<n)bp[d.entry]=closes[d.entry];
    ds.push({label:'_b',data:bp,type:'scatter',pointStyle:'triangle',pointRadius:alive?10:6,backgroundColor:alive?'#e8743b':'rgba(232,116,59,.4)',borderColor:'#fff',borderWidth:1.5});
  });
  if(charts[canvasId])charts[canvasId].destroy();
  const crosshair={id:'crosshair',afterDraw:(chart)=>{
    if(chart.tooltip&&chart.tooltip._active&&chart.tooltip._active.length){
      const ctx=chart.ctx; const x=chart.tooltip._active[0].element.x;
      const top=chart.chartArea.top, bot=chart.chartArea.bottom;
      ctx.save(); ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x,bot);
      ctx.lineWidth=1; ctx.strokeStyle='rgba(26,58,92,.35)'; ctx.setLineDash([4,4]); ctx.stroke(); ctx.restore();
    }
  }};
  charts[canvasId]=new Chart(document.getElementById(canvasId).getContext('2d'),{type:'line',data:{labels,datasets:ds},plugins:[crosshair],
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},
        tooltip:{enabled:true,backgroundColor:'rgba(26,58,92,.96)',padding:14,
          titleFont:{size:16,weight:'800'},bodyFont:{size:15,weight:'700'},displayColors:false,
          callbacks:{
            title:items=>items.length?ch[items[0].dataIndex].d:'',
            label:c=>{ if(c.dataset.label!=='종가') return null; return '가격  '+(c.raw?c.raw.toLocaleString():'')+'원'; },
            afterBody:items=>{ const m=ch[items[0].dataIndex].m2; return m?'2일선  '+Math.round(m).toLocaleString()+'원':''; }
          }}},
      scales:{
        x:{grid:{color:'#eef1f5'},ticks:{font:{size:13,weight:'700'},color:'#5a6b7d',maxTicksLimit:8,maxRotation:0}},
        y:{position:'right',grid:{color:'#eef1f5'},ticks:{font:{size:14,weight:'700'},color:'#5a6b7d',callback:v=>v.toLocaleString()}}}}});
}
function seg(n,x0,y0,x1,y1,color,w,alpha,dash){
  const a=new Array(n).fill(null);
  const lo=Math.max(0,Math.min(x0,x1)),hi=Math.min(n-1,Math.max(x0,x1));
  const s=(y1-y0)/((x1-x0)||1);
  for(let i=lo;i<=hi;i++)a[i]=Math.round(y0+s*(i-x0));
  return {label:'_s',data:a,borderColor:color,borderWidth:w,pointRadius:0,borderDash:dash||[],spanGaps:false};
}
function extend(n,x0,y0,slope,color,w,alpha){
  const a=new Array(n).fill(null);
  for(let i=x0;i<n;i++)a[i]=Math.round(y0+slope*(i-x0));
  return {label:'_e',data:a,borderColor:color,borderWidth:w,pointRadius:0,borderDash:[5,3]};
}
</script>
</body>
</html>
