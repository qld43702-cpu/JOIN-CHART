<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOIN CHART</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--navy:#1a3a5c;--orange:#e8743b;--green:#1d9e75;--red:#e24b4a;--blue:#378add;--purple:#7f77dd;--pink:#d4537e;--gray:#8a98a8;--line:#e3e8ee;--muted:#8a98a8;--faint:#a8b3c0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;padding:16px 14px 60px;font-size:16px}
.wrap{max-width:960px;margin:0 auto}
header{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.logo{width:40px;height:40px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;cursor:pointer}
.ttl{font-size:22px;font-weight:800}.sub{font-size:13px;color:var(--muted);margin-top:2px}
.search-box{position:relative;margin-bottom:8px}
.search-box input{width:100%;height:52px;border:2px solid #d5dce4;border-radius:12px;padding:0 18px;font-size:17px;font-weight:600;outline:none}
.search-box input:focus{border-color:var(--navy)}
.ac{position:absolute;top:56px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;z-index:20;box-shadow:0 4px 16px rgba(26,58,92,.12);display:none}
.ac.show{display:block}
.ac-item{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-top:1px solid var(--line)}
.ac-item:first-child{border-top:none}.ac-item:hover{background:var(--bg)}
.ac-item .an{font-weight:800;font-size:16px}.ac-item .acode{font-size:14px;color:var(--faint);font-weight:600}
.ac-item .amk{margin-left:auto;font-size:12px;padding:3px 9px;border-radius:7px;background:#fff3e8;color:var(--orange);font-weight:700}
.hint{font-size:13px;color:var(--faint);margin-bottom:16px}
#backbar{display:none;margin-bottom:12px}
#backbar button{font-size:14px;font-weight:700;padding:8px 16px;border:1px solid #d5dce4;border-radius:9px;background:#fff;color:var(--navy);cursor:pointer}
.result-head{display:flex;align-items:center;gap:10px;margin:14px 0 10px;flex-wrap:wrap}
.result-head .rn{font-size:20px;font-weight:800}.result-head .rc{font-size:14px;color:var(--faint);font-weight:600}
.result-head .rp{margin-left:auto;font-size:19px;font-weight:800}
.risk-alert{display:flex;align-items:center;gap:9px;margin:0 0 12px;padding:11px 14px;border-radius:10px;background:#fcebeb;border:1px solid #f09595}
.risk-alert .rt{font-size:14px;font-weight:700;color:#a32d2d}
.methods{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;padding:10px;background:#f7f9fb;border-radius:10px}
.methods label{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;padding:6px 11px;background:#fff;border:1px solid #e3e8ee;border-radius:8px}
.methods .up{color:var(--green);font-weight:700}.methods .dn{color:var(--pink);font-weight:700}
.chart-host{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px}
.chart-host canvas{width:100%;height:440px;display:block;cursor:crosshair}
.zoombar{display:flex;gap:6px;margin-bottom:8px}
.zoombar button{font-size:13px;font-weight:700;padding:5px 12px;border:1px solid #d5dce4;border-radius:8px;background:#fff;color:var(--navy);cursor:pointer}
.linetip{position:absolute;display:none;padding:5px 9px;border-radius:6px;font-size:13px;font-weight:600;color:#fff;pointer-events:none;white-space:nowrap;z-index:5}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:#5a6b7d}
.legend i{display:inline-block;width:14px;height:3px;vertical-align:middle;margin-right:3px}
.draws-info{margin-top:10px;font-size:13px;color:#555;line-height:1.8}
.draws-info .di{padding:5px 0;border-top:1px dashed var(--line)}.draws-info .di:first-child{border-top:none}
.di .alive{color:var(--green);font-weight:700}.di .dead{color:var(--faint)}.di .v{font-weight:700;color:var(--navy)}
.pattern-box{margin-top:12px;padding:12px 14px;border-radius:10px;background:#f7f9fb}
.pattern-box .pt-label{font-size:13px;color:#8a98a8;margin-bottom:4px}
.pattern-box .pt-name{font-size:16px;font-weight:800;margin-bottom:5px}
.pattern-box .pt-desc{font-size:13px;color:#3a4a5a;line-height:1.7}
.pattern-box .pt-score{font-size:12px;color:#a8b3c0;margin-top:6px}
.loading,.empty{text-align:center;padding:50px;color:var(--muted)}
.cap-summary{margin-top:14px;padding:11px 14px;background:#f0f7f3;border-radius:10px;font-size:14px;color:#2a6149;line-height:1.6}
.cap-summary b{color:#1d9e75;font-size:16px}
.prob-graph{margin-top:14px;padding:16px;background:#fff;border:1px solid var(--line);border-radius:12px}
.pg-title{font-size:15px;font-weight:800;color:var(--navy);margin-bottom:14px}
.pg-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.pg-name{width:74px;flex-shrink:0;font-size:14px;font-weight:700}
.pg-bars{flex:1;display:flex;flex-direction:column;gap:5px}
.pg-bar-wrap{position:relative;height:22px;background:#f2f5f8;border-radius:6px;overflow:hidden;display:flex;align-items:center}
.pg-bar{height:100%;border-radius:6px;transition:width .5s ease}
.pg-bar.up{background:linear-gradient(90deg,#1d9e75,#27c490)}
.pg-bar.dn{background:linear-gradient(90deg,#d4537e,#e8769a)}
.pg-val{position:absolute;right:8px;font-size:12px;font-weight:800}
.pg-val.up{color:#147a58}.pg-val.dn{color:#a8345b}
.pg-avg{margin-top:6px;padding-top:12px;border-top:2px solid var(--line)}
.pg-avg .pg-name{font-weight:800;color:var(--navy);font-size:15px}
.pg-avg .pg-bar-wrap{height:26px}
.note{font-size:13px;color:var(--muted);margin-top:16px;line-height:1.9}
@media(max-width:600px){
  body{padding:12px 10px 50px;font-size:15px}
  .ttl{font-size:19px}.search-box input{height:48px;font-size:16px}
  .chart-host canvas{height:360px}
  .methods{gap:5px;padding:8px}.methods label{font-size:13px;padding:5px 9px;gap:4px}
  .result-head .rp{font-size:17px}
  .legend{font-size:11px;gap:8px}
}
</style>
</head>
<body>
<div class="wrap">
<header><div class="logo" onclick="goHome()">J</div><div onclick="goHome()" style="cursor:pointer"><div class="ttl">JOIN CHART</div><div class="sub">종목 작도 + 미래 예측 · 일봉</div></div></header>
<div class="search-box">
  <input type="text" id="codeInput" placeholder="종목명 또는 코드 (예: 클로봇 / 466100)" autocomplete="off">
  <div class="ac" id="acList"></div>
</div>
<div class="hint">코스피·코스닥 전체. 차트 오른쪽 미래 3개월 공간에 작도 목표·위험·삼각수렴이 그려지고, 기법을 체크하면 예측 파동이 겹쳐집니다.</div>
<div id="backbar"><button onclick="goHome()">← 뒤로 (검색으로)</button></div>
<div id="result"></div>
<div class="note">
  작도 = 2일선 기준 · <span style="color:var(--green);font-weight:700">녹색</span> 상승목표 · <span style="color:var(--pink);font-weight:700">분홍</span> 위험(60분 포함) · <span style="color:var(--gray);font-weight:700">회색</span> 삼각수렴<br>
  미래 예측·확률은 통계 추정이며 단정이 아닙니다. 매매 판단은 본인 책임입니다.
</div>
</div>
<script>
var STOCKS=[];
fetch('stocks.json?t='+Date.now()).then(function(r){return r.json();}).then(function(s){STOCKS=s||[];}).catch(function(){STOCKS=[];});
var inp=document.getElementById('codeInput'), ac=document.getElementById('acList');
inp.addEventListener('input',function(){
  var q=inp.value.trim().toLowerCase();
  if(!q){ac.classList.remove('show');return;}
  var hit=STOCKS.filter(function(s){return s.code.includes(q)||(s.name&&s.name.toLowerCase().includes(q));}).slice(0,7);
  if(!hit.length){ac.classList.remove('show');return;}
  ac.innerHTML=hit.map(function(s){return '<div class="ac-item" onclick="pick(\''+s.code+'\',\''+((s.name||'').replace(/\'/g,''))+'\')">'+'<span class="an">'+s.name+'</span><span class="acode">'+s.code+'</span><span class="amk">'+s.market+'</span></div>';}).join('');
  ac.classList.add('show');
});
inp.addEventListener('keydown',function(e){
  if(e.key==='Enter'){
    ac.classList.remove('show');
    var q=inp.value.trim();
    var m=q.match(/(\d{6})/);
    if(m){go(m[1]);return;}
    var ql=q.toLowerCase();
    var hit=STOCKS.find(function(s){return s.name&&s.name.toLowerCase()===ql;})||STOCKS.find(function(s){return s.name&&s.name.toLowerCase().includes(ql);});
    if(hit)pick(hit.code,hit.name);
  }
});
document.addEventListener('click',function(e){if(!e.target.closest('.search-box'))ac.classList.remove('show');});
function pick(code,name){inp.value=name+' ('+code+')';ac.classList.remove('show');go(code);}
function goHome(){document.getElementById('result').innerHTML='';document.getElementById('backbar').style.display='none';inp.value='';inp.focus();window.scrollTo(0,0);}

function mkMethodLabel(val,nm,col,methods){
  var m=methods[val]||{up:'-',dn:'-'};
  return '<label><input type="checkbox" class="mtd" value="'+val+'" checked style="accent-color:'+col+'"> '+nm+' <span class="up">↑'+m.up+'%</span><span class="dn"> ↓'+m.dn+'%</span></label>';
}

async function go(code){
  var box=document.getElementById('result');
  document.getElementById('backbar').style.display='block';
  box.innerHTML='<div class="loading">작도·미래 예측 그리는 중...</div>';
  try{
    var x=await fetch('/api/analyze?code='+code).then(function(r){return r.json();});
    if(x.error){box.innerHTML='<div class="empty">'+x.error+'</div>';return;}
    render(x);
  }catch(e){box.innerHTML='<div class="empty">분석 실패. 잠시 후 다시 시도하세요.</div>';}
}

function render(x){
  var d=x['일봉'];
  var box=document.getElementById('result');
  if(!d||d.error||!d.chart){box.innerHTML='<div class="empty">'+((d&&d.error)||'데이터 없음')+'</div>';return;}
  var pj=d.projection||{methods:{}};
  var M=pj.methods||{};
  var src=d.risk_src||'';
  var html='';
  html+='<div class="result-head"><span class="rn">'+(x['종목명']||'')+'</span><span class="rc">'+x['종목코드']+' · '+(x['시장']||'')+'</span><span class="rp">'+((d.cur||0).toLocaleString())+'원</span></div>';
  if(d.risk_on){
    var w=src==='60분'?'60분봉에서 감지':(src==='과거'?'과거 구간에서 감지':'감지됨');
    html+='<div class="risk-alert"><span>⚠️</span><span class="rt">하락 위험 신호 — 반대 작도 '+w+'</span></div>';
  }
  // 변동성 과열 경고 (백테스트 검증)
  if(pj.overheat){
    var op=pj.overheat_prob||{up:27,dn:28,flat:45};
    html+='<div class="risk-alert" style="background:#fff4e8;border-color:#f0b67a">';
    html+='<span>🔥</span><span class="rt" style="color:#b35e1a">변동성 과열 — 기대범위가 작도 상한을 넘음. ';
    html+='과거 검증: 3개월 뒤 상승 '+op.up+'% / 하락 '+op.dn+'% / 횡보 '+op.flat+'% (상승 신호 아님, 주의)</span>';
    html+='</div>';
  }
  html+='<div class="methods">';
  html+=mkMethodLabel('ell','엘리엇','#7f77dd',M);
  html+=mkMethodLabel('mc','몬테카를로','#378add',M);
  html+=mkMethodLabel('fib','피보나치','#1d9e75',M);
  html+=mkMethodLabel('gann','갠','#ba7517',M);
  html+='</div>';
  html+='<div class="zoombar"><button id="zin">+ 확대</button><button id="zout">− 축소</button><button id="zall">전체</button></div>';
  html+='<div class="chart-host"><canvas id="cv"></canvas><div class="linetip" id="tip"></div></div>';
  html+='<div class="legend"><span><i style="background:#000"></i>2일선</span><span><i style="background:#1d9e75"></i>상승목표</span><span><i style="background:#d4537e"></i>위험</span><span><i style="background:#8a98a8"></i>삼각수렴</span><span><i style="background:#e8743b"></i>매물집중(물량 많은 가격)</span><span style="color:#a8b3c0">| 점선 우측=미래 3개월</span></div>';
  // ===== 캡 요약 + 확률 막대그래프 =====
  var techNames={ell:'엘리엇',mc:'몬테카를로',fib:'피보나치',gann:'갠'};
  var techCols={ell:'#7f77dd',mc:'#378add',fib:'#1d9e75',gann:'#ba7517'};
  // 캡 요약
  if(pj.cap_count!=null){
    var cc=pj.cap_count;
    html+='<div class="cap-summary">기법 목표 4개 중 <b>'+cc+'개</b>가 작도 상승목표(녹색)에 도달 — ';
    html+=(cc>=3?'다수 기법이 녹색까지 강하게 봄':cc===0?'기법들이 녹색보다 보수적':'일부만 녹색까지 봄');
    html+='</div>';
  }
  // 확률 막대그래프
  var order=['ell','mc','fib','gann'];
  var sumUp=0,sumDn=0,cnt=0;
  html+='<div class="prob-graph"><div class="pg-title">미래 3개월 상승 / 하락 확률</div>';
  for(var oi=0;oi<order.length;oi++){
    var k=order[oi]; var mm=M[k]; if(!mm)continue;
    var up=(typeof mm.up==='number')?mm.up:0, dn=(typeof mm.dn==='number')?mm.dn:0;
    sumUp+=up; sumDn+=dn; cnt++;
    html+='<div class="pg-row"><span class="pg-name" style="color:'+techCols[k]+'">'+techNames[k]+'</span>';
    html+='<div class="pg-bars">';
    html+='<div class="pg-bar-wrap"><div class="pg-bar up" style="width:'+up+'%"></div><span class="pg-val up">↑'+up+'%</span></div>';
    html+='<div class="pg-bar-wrap"><div class="pg-bar dn" style="width:'+dn+'%"></div><span class="pg-val dn">↓'+dn+'%</span></div>';
    html+='</div></div>';
  }
  // 평균
  if(cnt>0){
    var avgUp=Math.round(sumUp/cnt), avgDn=Math.round(sumDn/cnt);
    html+='<div class="pg-row pg-avg"><span class="pg-name">평균</span><div class="pg-bars">';
    html+='<div class="pg-bar-wrap"><div class="pg-bar up" style="width:'+avgUp+'%"></div><span class="pg-val up">↑'+avgUp+'%</span></div>';
    html+='<div class="pg-bar-wrap"><div class="pg-bar dn" style="width:'+avgDn+'%"></div><span class="pg-val dn">↓'+avgDn+'%</span></div>';
    html+='</div></div>';
  }
  html+='</div>';
  box.innerHTML=html;
  requestAnimationFrame(function(){requestAnimationFrame(function(){mkChart(d,pj);});});
}

function mkChart(data,pj){
  // ===== v3 모든 데이터 변수 최상단 선언 (TDZ 방지) =====
  var cv=document.getElementById('cv'), tip=document.getElementById('tip');
  var ch=data.chart, n=ch.length, draws=data.draws||[], risks=data.risks||[];
  var FUT=(pj&&pj.fut)||63, TOTAL=n+FUT, cur=data.cur;
  var c=[], ma2=[];
  for(var ci=0;ci<ch.length;ci++){c.push(ch[ci].c);ma2.push(ch[ci].m2);}
  var GREEN_START=0;
  if(pj&&pj.green_start!=null){GREEN_START=pj.green_start;}
  else if(draws.length){GREEN_START=draws[draws.length-1].M_t1||0;}
  else{GREEN_START=n-1;}
  if(GREEN_START<0)GREEN_START=0; if(GREEN_START>=n)GREEN_START=n-1;
  var green_base=(c[GREEN_START]!=null)?c[GREEN_START]:cur;
  var green_span=Math.max(1,TOTAL-1-GREEN_START);
  var DPR=window.devicePixelRatio||1;
  var padR=64,padL=8,padT=14,padB=38;
  var W,H,plot,viewS=0,viewE=TOTAL-1;
  // 초기 뷰: 작도 시작부터
  (function(){
    var cand=[];
    draws.forEach(function(d){cand.push(d.A_t1);});
    if(data.view_start!=null)cand.push(data.view_start);
    if(cand.length){var mn=Math.min.apply(null,cand);viewS=Math.max(0,mn-4);}
    viewE=TOTAL-1;
  })();
  function futDates(){
    var last=ch[n-1].d; // format: "MM/DD"
    var parts=last.split('/');
    var mo=parseInt(parts[0])||1, dy=parseInt(parts[1])||1;
    var dt=new Date(2026,mo-1,dy);
    var out=[]; var k=0;
    while(k<FUT){
      dt=new Date(dt.getTime()+86400000);
      var w=dt.getDay();
      if(w===0||w===6)continue;
      out.push((dt.getMonth()+1)+'/'+(dt.getDate()));
      k++;
    }
    return out;
  }
  var fdates=futDates();
  function lbl(i){return i<n?ch[i].d:(fdates[i-n]||'');}
  function lay(){
    W=cv.clientWidth; H=cv.clientHeight;
    if(!W||!H){W=cv.clientWidth||cv.parentElement.clientWidth-20||900;H=cv.clientHeight||440;}
    cv.width=W*DPR; cv.height=H*DPR;
    cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
    var vs=Math.max(0,viewS), ve=Math.min(TOTAL-1,viewE);
    var lo=1e18, hi=-1e18;
    for(var i=vs;i<=Math.min(ve,n-1);i++){lo=Math.min(lo,ch[i].l);hi=Math.max(hi,ch[i].h);}
    if(ve>=n&&pj){hi=Math.max(hi,pj.up_target||hi);lo=Math.min(lo,pj.dn_target||lo);}
    risks.forEach(function(r){if(r.yc)lo=Math.min(lo,r.yc);});
    if(lo>hi){lo=Math.min.apply(null,c);hi=Math.max.apply(null,c);}
    lo*=0.97; hi*=1.03;
    plot={lo:lo,hi:hi,x0:padL,x1:W-padR,y0:padT,y1:H-padB};
  }
  function getSpan(){return viewE-viewS+1;}
  function xOf(i){return plot.x0+(i-viewS+0.5)/getSpan()*(plot.x1-plot.x0);}
  function yOf(v){return plot.y1-(v-plot.lo)/(plot.hi-plot.lo)*(plot.y1-plot.y0);}
  function vOf(y){return plot.lo+(plot.y1-y)/(plot.y1-plot.y0)*(plot.hi-plot.lo);}
  function iOfX(x){return Math.round(viewS+(x-plot.x0)/(plot.x1-plot.x0)*getSpan()-0.5);}
  function FF(){return getComputedStyle(document.body).fontFamily;}
  function getChecked(){return Array.from(document.querySelectorAll('.mtd:checked')).map(function(el){return el.value;});}
  function seg(ctx,i0,y0,i1,y1,color,w,dash){
    if(i1<viewS||i0>viewE)return;
    ctx.strokeStyle=color;ctx.lineWidth=w;ctx.setLineDash(dash||[]);
    ctx.beginPath();ctx.moveTo(xOf(i0),yOf(y0));ctx.lineTo(xOf(i1),yOf(y1));ctx.stroke();ctx.setLineDash([]);
  }
  // fwave: fromGreen=true이면 GREEN_START부터, false면 n-1(현재)부터
  // fn(t, basePrice) → y값 반환
  function fwave(ctx,fn,color,wid,dash,fromGreen){
    var startI=fromGreen?GREEN_START:n-1;
    var baseP=fromGreen?green_base:cur;
    var totalSpan=fromGreen?green_span:FUT;
    var endI=Math.min(viewE,TOTAL-1);
    if(startI>endI)return;
    ctx.strokeStyle=color;ctx.lineWidth=wid;ctx.setLineDash(dash||[]);
    ctx.beginPath();
    ctx.moveTo(xOf(startI),yOf(baseP));
    for(var i=startI;i<=endI;i++){
      var t=(totalSpan>0)?(i-startI)/totalSpan:0;
      ctx.lineTo(xOf(i),yOf(fn(t,baseP)));
    }
    ctx.stroke();ctx.setLineDash([]);
  }
  function draw(mx,my){
    var ctx=cv.getContext('2d');
    ctx.clearRect(0,0,W,H);
    ctx.font='12px '+FF();
    // 격자
    ctx.strokeStyle='#eef1f5';ctx.lineWidth=1;ctx.fillStyle='#9aa6b2';ctx.textAlign='left';
    for(var g=0;g<=4;g++){
      var v=plot.lo+(plot.hi-plot.lo)*g/4, y=yOf(v);
      ctx.beginPath();ctx.moveTo(plot.x0,y);ctx.lineTo(plot.x1,y);ctx.stroke();
      ctx.fillText(Math.round(v).toLocaleString(),plot.x1+6,y+4);
    }
    // X축 날짜
    ctx.fillStyle='#5a6b7d';ctx.textAlign='center';ctx.font='12px '+FF();
    for(var t=0;t<6;t++){
      var idx=viewS+Math.round((getSpan()-1)*t/5);
      var L=lbl(idx);if(L)ctx.fillText(L,xOf(idx),plot.y1+16);
    }
    // 현재선
    var nowX=xOf(n-1);
    if(viewE>=n){
      ctx.fillStyle='rgba(120,140,160,.05)';ctx.fillRect(nowX,plot.y0,plot.x1-nowX,plot.y1-plot.y0);
      ctx.strokeStyle='rgba(26,58,92,.3)';ctx.setLineDash([5,4]);ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(nowX,plot.y0);ctx.lineTo(nowX,plot.y1);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#8a98a8';ctx.fillText('현재',nowX,plot.y0+12);
    }
    // ===== 매물대 (Volume Profile) — 왼쪽 가로 막대 =====
    (function(){
      var BINS=24;
      var binVol=new Array(BINS).fill(0);
      var range=plot.hi-plot.lo;
      if(range<=0)return;
      // 보이는 구간의 각 봉 거래량을 고가~저가에 고르게 분산
      for(var i=Math.max(0,viewS);i<=Math.min(viewE,n-1);i++){
        var r=ch[i];
        var vol=r.v||0;
        if(vol<=0)continue;
        var hi=r.h, lo=r.l;
        if(hi<lo){var tmp=hi;hi=lo;lo=tmp;}
        // 이 봉이 걸치는 bin 범위
        var b0=Math.floor((lo-plot.lo)/range*BINS);
        var b1=Math.floor((hi-plot.lo)/range*BINS);
        b0=Math.max(0,Math.min(BINS-1,b0));
        b1=Math.max(0,Math.min(BINS-1,b1));
        var nb=b1-b0+1;
        var per=vol/nb;
        for(var b=b0;b<=b1;b++){binVol[b]+=per;}
      }
      var maxVol=Math.max.apply(null,binVol);
      if(maxVol<=0)return;
      var pocBin=binVol.indexOf(maxVol);  // 가장 물량 많은 가격대
      var maxBarW=(plot.x1-plot.x0)*0.22;  // 막대 최대 길이(차트 폭의 22%)
      var binH=(plot.y1-plot.y0)/BINS;
      for(var b=0;b<BINS;b++){
        if(binVol[b]<=0)continue;
        var bw=binVol[b]/maxVol*maxBarW;
        var by=plot.y1-(b+1)*binH;
        var isPoc=(b===pocBin);
        ctx.fillStyle=isPoc?'rgba(232,116,59,.45)':'rgba(138,152,168,.20)';
        ctx.fillRect(plot.x0,by,bw,binH-1);
      }
      // POC(매물 집중) 라벨 + 가로 점선
      var pocPrice=plot.lo+(pocBin+0.5)/BINS*range;
      var pocY=yOf(pocPrice);
      ctx.strokeStyle='rgba(232,116,59,.55)';ctx.lineWidth=1;ctx.setLineDash([2,3]);
      ctx.beginPath();ctx.moveTo(plot.x0,pocY);ctx.lineTo(plot.x1,pocY);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#e8743b';ctx.font='11px '+FF();ctx.textAlign='left';
      ctx.fillText('매물집중 '+Math.round(pocPrice).toLocaleString(),plot.x0+4,pocY-3);
    })();

    // 캔들
    var cw=Math.max(1.5,(plot.x1-plot.x0)/getSpan()*0.6);
    for(var i=Math.max(0,viewS);i<=Math.min(viewE,n-1);i++){
      var r=ch[i],x=xOf(i),u=r.c>=r.o;
      ctx.strokeStyle=u?'rgba(226,75,74,.5)':'rgba(55,138,221,.5)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(x,yOf(r.h));ctx.lineTo(x,yOf(r.l));ctx.stroke();
      ctx.fillStyle=u?'rgba(226,75,74,.45)':'rgba(55,138,221,.45)';
      var yo=yOf(r.o),yc2=yOf(r.c);
      ctx.fillRect(x-cw/2,Math.min(yo,yc2),cw,Math.max(1.5,Math.abs(yc2-yo)));
    }
    // 2일선
    ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.beginPath();var st=false;
    for(var i=Math.max(0,viewS);i<=Math.min(viewE,n-1);i++){
      if(ma2[i]==null)continue;
      var x=xOf(i),y=yOf(ma2[i]);
      if(!st){ctx.moveTo(x,y);st=true;}else{ctx.lineTo(x,y);}
    }
    ctx.stroke();
    // 위험선
    risks.forEach(function(d){
      if(!d.price_only){
        seg(ctx,d.A_t1-1,ma2[d.A_t1-1]||d.A_y1,d.A_t1,d.A_y1,'#d4537e',2.4);
        seg(ctx,d.B_t1,d.B_y1,Math.round(d.xc),d.yc,'rgba(212,83,126,.6)',1.2,[4,3]);
      }
      ctx.strokeStyle='rgba(212,83,126,.85)';ctx.lineWidth=1.4;ctx.setLineDash(d.price_only?[6,4]:[]);
      ctx.beginPath();ctx.moveTo(plot.x0,yOf(d.yc));ctx.lineTo(plot.x1,yOf(d.yc));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#d4537e';ctx.fillRect(plot.x1-2,yOf(d.yc)-9,64,18);
      ctx.fillStyle='#fff';ctx.font='11px '+FF();ctx.fillText('위험 '+Math.round(d.yc).toLocaleString(),plot.x1+2,yOf(d.yc)+3);
    });
    // 작도선
    draws.forEach(function(d){
      var al=d.alive?1:.32;
      seg(ctx,d.A_t1-1,ma2[d.A_t1-1]||d.A_y1,d.A_t1,d.A_y1,'rgba(226,75,74,'+al+')',2.4);
      seg(ctx,d.A_t1,d.A_y1,Math.round(d.xc),d.yc,'rgba(226,75,74,'+(al*.5)+')',1,[4,3]);
      seg(ctx,d.B_t1-1,ma2[d.B_t1-1]||d.B_y1,d.B_t1,d.B_y1,'rgba(55,138,221,'+al+')',2.4);
      seg(ctx,d.B_t1,d.B_y1,Math.round(d.xc),d.yc,'rgba(55,138,221,'+(al*.5)+')',1,[4,3]);
      if(d.entry>=viewS&&d.entry<=viewE&&d.entry<n){
        ctx.fillStyle=d.alive?'#e8743b':'rgba(232,116,59,.4)';
        var ex=xOf(d.entry),ey=yOf(c[d.entry]);
        ctx.beginPath();ctx.moveTo(ex,ey-6);ctx.lineTo(ex-5,ey+5);ctx.lineTo(ex+5,ey+5);ctx.closePath();ctx.fill();
      }
    });
    // 미래 예측 (전부 직선)
    if(viewE>=n&&pj){
      var us=pj.up_slope||0, upT=pj.up_target, dnT=pj.dn_target, vol=pj.volatility||0.02;
      // 기본 틀: 현재(n-1)부터 — 직선
      fwave(ctx,function(t,b){return b+(upT-b)*t;},'rgba(29,158,117,.95)',2.4,[6,4],false);       // 상승목표(녹색)
      fwave(ctx,function(t,b){return b+(dnT-b)*t;},'rgba(212,83,126,.9)',2.4,[6,4],false);         // 위험(분홍)
      fwave(ctx,function(t,b){return b+b*0.10*(1-t);},'rgba(138,152,168,.6)',1.3,[],false);        // 삼각수렴 상단
      fwave(ctx,function(t,b){return b-b*0.10*(1-t);},'rgba(138,152,168,.6)',1.3,[],false);        // 삼각수렴 하단
      // 체크박스 기법: 전부 변동성 기반 현실 목표, 현재(n-1)부터 직선. 작도(녹색)는 위에서 이미 그림.
      var checked=getChecked();
      var TT=pj.tech_targets||{};
      if(checked.indexOf('ell')>=0){
        // 엘리엇: 1.5σ 목표
        var ellTarget=(TT.ell&&isFinite(TT.ell))?TT.ell:cur*1.15;
        fwave(ctx,function(t,b){return b+(ellTarget-b)*t;},'rgba(127,119,221,.85)',2,[],false);
      }
      if(checked.indexOf('mc')>=0){
        // 몬테카를로: 시뮬 중앙값
        var mcTarget=(TT.mc&&isFinite(TT.mc))?TT.mc:(pj.mc_target||cur*1.1);
        fwave(ctx,function(t,b){return b+(mcTarget-b)*t;},'rgba(55,138,221,.85)',2,[],false);
      }
      if(checked.indexOf('gann')>=0){
        // 갠: 1σ 목표 (보수)
        var gannTarget=(TT.gann&&isFinite(TT.gann))?TT.gann:cur*1.08;
        fwave(ctx,function(t,b){return b+(gannTarget-b)*t;},'rgba(186,117,23,.85)',2,[],false);
      }
      if(checked.indexOf('fib')>=0){
        // 피보나치: 현재가 기준 ±σ 사이 황금비율 레벨 (수평선)
        var fibUp=(TT.fib_up&&isFinite(TT.fib_up))?TT.fib_up:cur*1.3;
        var fibDn=(TT.fib_dn&&isFinite(TT.fib_dn))?TT.fib_dn:cur*0.8;
        // 현재가~상단 사이를 황금비율로 분할
        var fibLevels=[
          {r:0.382, p:cur+(fibUp-cur)*0.382},
          {r:0.618, p:cur+(fibUp-cur)*0.618},
          {r:1.0,   p:fibUp},
          {r:-0.382,p:cur+(fibDn-cur)*0.382},
          {r:-0.618,p:cur+(fibDn-cur)*0.618}
        ];
        for(var fi=0;fi<fibLevels.length;fi++){
          var lv=fibLevels[fi].p, up=lv>cur;
          ctx.strokeStyle=up?'rgba(29,158,117,.55)':'rgba(212,83,126,.55)';
          ctx.setLineDash([3,3]);ctx.lineWidth=1.2;
          ctx.beginPath();ctx.moveTo(xOf(n-1),yOf(lv));ctx.lineTo(xOf(Math.min(viewE,TOTAL-1)),yOf(lv));ctx.stroke();ctx.setLineDash([]);
          ctx.fillStyle=up?'rgba(29,158,117,.85)':'rgba(212,83,126,.85)';
          ctx.font='10px '+FF();ctx.textAlign='left';
          ctx.fillText(Math.round(lv).toLocaleString(),xOf(n-1)+2,yOf(lv)-2);
        }
      }
    }
    // 크로스헤어
    if(mx!=null&&mx>=plot.x0&&mx<=plot.x1&&my!=null){
      ctx.strokeStyle='rgba(26,58,92,.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);
      ctx.beginPath();ctx.moveTo(mx,plot.y0);ctx.lineTo(mx,plot.y1);ctx.stroke();
      ctx.beginPath();ctx.moveTo(plot.x0,my);ctx.lineTo(plot.x1,my);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#1a3a5c';ctx.fillRect(plot.x1,my-11,padR-2,22);
      ctx.fillStyle='#fff';ctx.font='13px '+FF();ctx.textAlign='left';ctx.fillText(Math.round(vOf(my)).toLocaleString(),plot.x1+5,my+4);
      var idx=iOfX(mx), L=lbl(idx);
      if(L){var tw=ctx.measureText(L).width+12;ctx.fillStyle='#1a3a5c';ctx.fillRect(mx-tw/2,plot.y1+2,tw,18);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(L,mx,plot.y1+14);}
    }
  }
  var lastMx=null, lastMy=null;
  function hover(e){
    var r=cv.getBoundingClientRect();lastMx=e.clientX-r.left;lastMy=e.clientY-r.top;
    draw(lastMx,lastMy);tip.style.display='none';
    draws.forEach(function(d){if(Math.abs(lastMy-yOf(d.yc))<6){tip.style.display='block';tip.style.background='#7f77dd';tip.textContent='교차점 '+d.yc.toLocaleString();tip.style.left=Math.min(lastMx+12,W-90)+'px';tip.style.top=(yOf(d.yc)-28)+'px';}});
    risks.forEach(function(d){if(Math.abs(lastMy-yOf(d.yc))<6){tip.style.display='block';tip.style.background='#d4537e';tip.textContent='위험 '+d.yc.toLocaleString();tip.style.left=Math.min(lastMx+12,W-110)+'px';tip.style.top=(yOf(d.yc)-28)+'px';}});
  }
  cv.addEventListener('mousemove',hover);
  cv.addEventListener('mouseleave',function(){lastMx=lastMy=null;draw(null,null);tip.style.display='none';});
  cv.addEventListener('wheel',function(e){
    e.preventDefault();
    var r=cv.getBoundingClientRect(), mx=e.clientX-r.left;
    var center=iOfX(mx), sp=getSpan();
    var ns=Math.max(15,Math.min(TOTAL,Math.round(sp*(e.deltaY>0?1.15:0.87))));
    var ratio=(center-viewS)/sp;
    var s=Math.round(center-ns*ratio), en=s+ns-1;
    if(s<0){s=0;en=ns-1;}if(en>TOTAL-1){en=TOTAL-1;s=Math.max(0,en-ns+1);}
    viewS=s;viewE=en;lay();draw(lastMx,lastMy);
  },{passive:false});
  var drag=false, dx0=0, dvs=0;
  cv.addEventListener('mousedown',function(e){drag=true;dx0=e.clientX;dvs=viewS;});
  window.addEventListener('mouseup',function(){drag=false;});
  cv.addEventListener('mousemove',function(e){
    if(!drag)return;
    var dx=e.clientX-dx0, per=(plot.x1-plot.x0)/getSpan();
    var sh=Math.round(-dx/per), sp=getSpan(), s=dvs+sh;
    if(s<0)s=0;if(s+sp>TOTAL)s=TOTAL-sp;
    viewS=s;viewE=s+sp-1;lay();draw(lastMx,lastMy);
  });
  document.getElementById('zin').onclick=function(){var sp=getSpan(),ns=Math.max(15,Math.round(sp*0.7)),md=Math.round((viewS+viewE)/2);viewS=Math.max(0,md-Math.round(ns/2));viewE=Math.min(TOTAL-1,viewS+ns-1);lay();draw();};
  document.getElementById('zout').onclick=function(){var sp=getSpan(),ns=Math.min(TOTAL,Math.round(sp*1.4)),md=Math.round((viewS+viewE)/2);viewS=Math.max(0,md-Math.round(ns/2));viewE=Math.min(TOTAL-1,viewS+ns-1);lay();draw();};
  document.getElementById('zall').onclick=function(){viewS=0;viewE=TOTAL-1;lay();draw();};
  document.querySelectorAll('.mtd').forEach(function(el){el.addEventListener('change',function(){draw(lastMx,lastMy);});});
  try{lay();draw(null,null);}catch(err){console.error('draw error:',err);}
  window.addEventListener('resize',function(){lay();draw(null,null);});
}
</script>
</body>
</html>
