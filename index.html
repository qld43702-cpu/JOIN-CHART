<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOIN CHART</title>
<style>
  :root {
    --bg: #f4f6f8;
    --card: #ffffff;
    --navy: #1a3a5c;
    --orange: #e8743b;
    --line: #e3e8ee;
    --muted: #8a98a8;
    --faint: #a8b3c0;
    --shadow: 0 1px 4px rgba(26,58,92,0.06);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: var(--bg); color: var(--navy);
    font-family: -apple-system, "Apple SD Gothic Neo", "Malgun Gothic", sans-serif;
    -webkit-font-smoothing: antialiased;
    padding: 18px 14px 60px;
  }
  .wrap { max-width: 820px; margin: 0 auto; }
  header { display: flex; align-items: center; gap: 10px; margin-bottom: 18px; }
  .logo {
    width: 38px; height: 38px; border-radius: 10px; background: var(--orange);
    display: flex; align-items: center; justify-content: center;
    color: #fff; font-weight: 800; font-size: 18px;
  }
  .ttl { font-size: 19px; font-weight: 800; letter-spacing: -0.3px; }
  .sub { font-size: 11px; color: var(--muted); margin-top: 1px; }
  .updated { margin-left: auto; font-size: 11px; color: var(--muted); }
  .summary { display: flex; gap: 8px; margin-bottom: 16px; }
  .stat {
    flex: 1; background: var(--card); border-radius: 12px; padding: 14px 10px;
    box-shadow: var(--shadow);
  }
  .stat .n { font-size: 22px; font-weight: 800; }
  .stat .l { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .star3 .n { color: var(--orange); }
  .tabs { display: flex; gap: 7px; margin-bottom: 14px; flex-wrap: wrap; }
  .tab {
    padding: 7px 14px; border-radius: 999px; background: var(--card);
    color: var(--muted); font-size: 12px; border: 1px solid var(--line);
    cursor: pointer; transition: all 0.15s;
  }
  .tab.active { background: var(--navy); color: #fff; border-color: var(--navy); font-weight: 600; }
  .list { background: var(--card); border-radius: 12px; overflow: hidden; box-shadow: var(--shadow); }
  .row {
    display: flex; align-items: center; padding: 14px;
    border-bottom: 1px solid #eef1f5; cursor: pointer; transition: background 0.1s;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: #fafbfc; }
  .grade { width: 50px; font-size: 13px; letter-spacing: 1px; white-space: nowrap; }
  .g3 { color: var(--orange); }
  .g2 { color: var(--navy); }
  .g1 { color: #4a9edb; }
  .g0 { color: var(--faint); }
  .info { flex: 1; min-width: 0; }
  .name { font-weight: 700; }
  .code { font-size: 11px; color: var(--faint); margin-left: 6px; }
  .meta { font-size: 11px; color: var(--faint); margin-top: 2px; }
  .right { text-align: right; white-space: nowrap; }
  .price { font-weight: 700; font-variant-numeric: tabular-nums; }
  .ind { font-size: 11px; margin-top: 2px; }
  .on { color: var(--orange); }
  .off { color: #cdd5de; }
  .empty { text-align: center; padding: 60px 20px; color: var(--muted); }
  .loading { text-align: center; padding: 60px; color: var(--muted); }
  .note { font-size: 11px; color: var(--faint); margin-top: 16px; line-height: 1.7; }
</style>
</head>
<body>
<div class="wrap">
  <header>
    <div class="logo">J</div>
    <div>
      <div class="ttl">JOIN CHART</div>
      <div class="sub">작도 신호 자동 스캔</div>
    </div>
    <div class="updated" id="updated">불러오는 중...</div>
  </header>

  <div class="summary" id="summary"></div>

  <div class="tabs">
    <div class="tab active" data-f="best">매수후보 ★★↑</div>
    <div class="tab" data-f="all">전체</div>
    <div class="tab" data-f="kospi">코스피</div>
    <div class="tab" data-f="kosdaq">코스닥</div>
  </div>

  <div id="content"><div class="loading">데이터 불러오는 중...</div></div>

  <div class="note">
    ★★★ 추세(20일선 위) + MACD 양전 + 완만도 0.7 미만 · ★★ 추세 + MACD · ★ 추세만<br>
    매일 장 마감 후 자동 갱신 · 종목 클릭 시 네이버 금융 이동 · 투자 판단과 책임은 본인에게 있습니다.
  </div>
</div>

<script>
let DATA = null, filter = 'best';

async function load() {
  try {
    const res = await fetch('result.json?t=' + Date.now());
    DATA = await res.json();
    document.getElementById('updated').textContent = '갱신 ' + DATA.업데이트;
    renderSummary(); render();
  } catch (e) {
    document.getElementById('content').innerHTML =
      '<div class="empty">아직 데이터가 없습니다.<br>첫 스캔이 실행되면 표시됩니다.</div>';
    document.getElementById('updated').textContent = '';
  }
}

function renderSummary() {
  const r = DATA.결과;
  const c = g => r.filter(x => x.추천도 === g).length;
  document.getElementById('summary').innerHTML = `
    <div class="stat star3"><div class="n">${c('★★★')}</div><div class="l">★★★ 최우선</div></div>
    <div class="stat"><div class="n">${c('★★')}</div><div class="l">★★ 우량</div></div>
    <div class="stat"><div class="n">${c('★')}</div><div class="l">★ 관심</div></div>
    <div class="stat"><div class="n">${r.length}</div><div class="l">전체</div></div>`;
}

function gc(g){return g==='★★★'?'g3':g==='★★'?'g2':g==='★'?'g1':'g0';}

function render() {
  let rows = DATA.결과;
  if (filter === 'best') rows = rows.filter(x => x.추천도 === '★★★' || x.추천도 === '★★');
  else if (filter === 'kospi') rows = rows.filter(x => x.시장 === '코스피');
  else if (filter === 'kosdaq') rows = rows.filter(x => x.시장 === '코스닥');

  if (!rows.length) {
    document.getElementById('content').innerHTML = '<div class="empty">해당 조건의 종목이 없습니다.</div>';
    return;
  }
  let h = '<div class="list">';
  for (const x of rows) {
    h += `<div class="row" onclick="window.open('https://finance.naver.com/item/main.naver?code=${x.종목코드}','_blank')">
      <div class="grade ${gc(x.추천도)}">${x.추천도}</div>
      <div class="info">
        <span class="name">${x.종목명}</span><span class="code">${x.종목코드}</span>
        <div class="meta">${x.시장} · 완만도 ${x.완만도}</div>
      </div>
      <div class="right">
        <div class="price">${x.현재가.toLocaleString()}</div>
        <div class="ind">추세<span class="${x['20일선위']?'on':'off'}">●</span>
          MACD<span class="${x.MACD양전?'on':'off'}">●</span></div>
      </div>
    </div>`;
  }
  h += '</div>';
  document.getElementById('content').innerHTML = h;
}

document.querySelectorAll('.tab').forEach(t => t.addEventListener('click', () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active'); filter = t.dataset.f; render();
}));

load();
</script>
</body>
</html>
