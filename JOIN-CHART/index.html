<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JOIN CHART</title>
<style>
:root{--bg:#f4f6f8;--card:#fff;--navy:#1a3a5c;--orange:#e8743b;--green:#1d9e75;--red:#e24b4a;--blue:#378add;--purple:#7f77dd;--pink:#d4537e;--gray:#8a98a8;--line:#e3e8ee;--muted:#8a98a8;--faint:#a8b3c0}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--navy);font-family:-apple-system,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;padding:16px 14px 60px;font-size:16px}
.wrap{max-width:960px;margin:0 auto}
header{display:flex;align-items:center;gap:11px;margin-bottom:16px}
.logo{width:40px;height:40px;border-radius:10px;background:var(--orange);display:flex;align-items:center;justify-content:center;color:#fff;font-weight:800;font-size:20px;cursor:pointer}
.ttl{font-size:22px;font-weight:800}.sub{font-size:13px;color:var(--muted);margin-top:2px}
.search-box{position:relative;margin-bottom:8px}
.search-box input{width:100%;height:52px;border:2px solid #d5dce4;border-radius:12px;padding:0 18px;font-size:17px;font-weight:600;outline:none}
.search-box input:focus{border-color:var(--navy)}
.ac{position:absolute;top:56px;left:0;right:0;background:#fff;border:1px solid var(--line);border-radius:12px;overflow:hidden;z-index:20;box-shadow:0 4px 16px rgba(26,58,92,.12);display:none}
.ac.show{display:block}
.ac-item{padding:12px 16px;display:flex;align-items:center;gap:10px;cursor:pointer;border-top:1px solid var(--line)}
.ac-item:first-child{border-top:none}.ac-item:hover{background:var(--bg)}
.ac-item .an{font-weight:800;font-size:16px}.ac-item .acode{font-size:14px;color:var(--faint);font-weight:600}
.ac-item .amk{margin-left:auto;font-size:12px;padding:3px 9px;border-radius:7px;background:#fff3e8;color:var(--orange);font-weight:700}
.hint{font-size:13px;color:var(--faint);margin-bottom:16px}
#backbar{display:none;margin-bottom:12px}
#backbar button{font-size:14px;font-weight:700;padding:8px 16px;border:1px solid #d5dce4;border-radius:9px;background:#fff;color:var(--navy);cursor:pointer}
.result-head{display:flex;align-items:center;gap:10px;margin:14px 0 10px;flex-wrap:wrap}
.result-head .rn{font-size:20px;font-weight:800}.result-head .rc{font-size:14px;color:var(--faint);font-weight:600}
.result-head .rp{margin-left:auto;font-size:19px;font-weight:800}
.risk-alert{display:flex;align-items:center;gap:9px;margin:0 0 12px;padding:11px 14px;border-radius:10px;background:#fcebeb;border:1px solid #f09595}
.risk-alert .rt{font-size:14px;font-weight:700;color:#a32d2d}
.methods{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;padding:10px;background:#f7f9fb;border-radius:10px}
.methods label{display:flex;align-items:center;gap:6px;font-size:14px;cursor:pointer;padding:6px 11px;background:#fff;border:1px solid #e3e8ee;border-radius:8px}
.methods .up{color:var(--green);font-weight:700}.methods .dn{color:var(--pink);font-weight:700}
.chart-host{position:relative;background:var(--card);border:1px solid var(--line);border-radius:14px;padding:10px}
.chart-host canvas{width:100%;height:440px;display:block;cursor:crosshair}
.zoombar{display:flex;gap:6px;margin-bottom:8px}
.zoombar button{font-size:13px;font-weight:700;padding:5px 12px;border:1px solid #d5dce4;border-radius:8px;background:#fff;color:var(--navy);cursor:pointer}
.linetip{position:absolute;display:none;padding:5px 9px;border-radius:6px;font-size:13px;font-weight:600;color:#fff;pointer-events:none;white-space:nowrap;z-index:5}
.legend{display:flex;gap:12px;flex-wrap:wrap;margin-top:8px;font-size:12px;color:#5a6b7d}
.legend i{display:inline-block;width:14px;height:3px;vertical-align:middle;margin-right:3px}
.draws-info{margin-top:10px;font-size:13px;color:#555;line-height:1.8}
.draws-info .di{padding:5px 0;border-top:1px dashed var(--line)}.draws-info .di:first-child{border-top:none}
.di .alive{color:var(--green);font-weight:700}.di .dead{color:var(--faint)}.di .v{font-weight:700;color:var(--navy)}
.loading,.empty{text-align:center;padding:50px;color:var(--muted)}
.note{font-size:13px;color:var(--muted);margin-top:16px;line-height:1.9}
@media(max-width:600px){
  body{padding:12px 10px 50px;font-size:15px}
  .ttl{font-size:19px}.search-box input{height:48px;font-size:16px}
  .chart-host canvas{height:360px}
  .methods{gap:5px;padding:8px}.methods label{font-size:13px;padding:5px 9px;gap:4px}
  .result-head .rp{font-size:17px}
  .legend{font-size:11px;gap:8px}
}
</style>
</head>
<body>
<div class="wrap">
<header><div class="logo" onclick="goHome()">J</div><div onclick="goHome()" style="cursor:pointer"><div class="ttl">JOIN CHART</div><div class="sub">종목 작도 + 미래 예측 · 일봉</div></div></header>
<div class="search-box">
  <input type="text" id="codeInput" placeholder="종목명 또는 코드 (예: 클로봇 / 466100)" autocomplete="off">
  <div class="ac" id="acList"></div>
</div>
<div class="hint">코스피·코스닥 전체. 차트 오른쪽 미래 3개월 공간에 작도 목표·위험·삼각수렴이 그려지고, 기법을 체크하면 예측 파동이 겹쳐집니다.</div>
<div id="backbar"><button onclick="goHome()">← 뒤로 (검색으로)</button></div>
<div id="result"></div>
<div class="note">
  작도 = 2일선 기준 · <span style="color:var(--green);font-weight:700">녹색</span> 상승목표 · <span style="color:var(--pink);font-weight:700">분홍</span> 위험(60분 포함) · <span style="color:var(--gray);font-weight:700">회색</span> 삼각수렴<br>
  미래 예측·확률은 통계 추정이며 단정이 아닙니다. 매매 판단은 본인 책임입니다.
</div>
</div>
<script>
let STOCKS=[];
fetch('stocks.json?t='+Date.now()).then(r=>r.json()).then(s=>STOCKS=s||[]).catch(()=>STOCKS=[]);
const inp=document.getElementById('codeInput'), ac=document.getElementById('acList');
inp.addEventListener('input',()=>{
  const q=inp.value.trim().toLowerCase();
  if(!q){ac.classList.remove('show');return;}
  const hit=STOCKS.filter(s=>s.code.includes(q)||(s.name&&s.name.toLowerCase().includes(q))).slice(0,7);
  if(!hit.length){ac.classList.remove('show');return;}
  ac.innerHTML=hit.map(s=>`<div class="ac-item" onclick="pick('${s.code}','${(s.name||'').replace(/'/g,'')}')"><span class="an">${s.name}</span><span class="acode">${s.code}</span><span class="amk">${s.market}</span></div>`).join('');
  ac.classList.add('show');
});
inp.addEventListener('keydown',e=>{if(e.key==='Enter'){ac.classList.remove('show');const q=inp.value.trim();const m=q.match(/(\d{6})/);if(m){go(m[1]);return;}const ql=q.toLowerCase();let hit=STOCKS.find(s=>s.name&&s.name.toLowerCase()===ql)||STOCKS.find(s=>s.name&&s.name.toLowerCase().includes(ql));if(hit)pick(hit.code,hit.name);}});
document.addEventListener('click',e=>{if(!e.target.closest('.search-box'))ac.classList.remove('show');});
function pick(code,name){inp.value=name+' ('+code+')';ac.classList.remove('show');go(code);}
function goHome(){document.getElementById('result').innerHTML='';document.getElementById('backbar').style.display='none';inp.value='';inp.focus();window.scrollTo(0,0);}

async function go(code){
  const box=document.getElementById('result');
  document.getElementById('backbar').style.display='block';
  box.innerHTML='<div class="loading">작도·미래 예측 그리는 중...</div>';
  try{
    const x=await fetch('/api/analyze?code='+code).then(r=>r.json());
    if(x.error){box.innerHTML='<div class="empty">'+x.error+'</div>';return;}
    render(x);
  }catch(e){box.innerHTML='<div class="empty">분석 실패. 잠시 후 다시 시도하세요.</div>';}
}

function render(x){
  const d=x.일봉;
  const box=document.getElementById('result');
  if(!d||d.error||!d.chart){box.innerHTML='<div class="empty">'+((d&&d.error)||'데이터 없음')+'</div>';return;}
  const pj=d.projection||{methods:{}};
  const M=pj.methods||{};
  const src=d.risk_src||'';
  let html=`<div class="result-head"><span class="rn">${x.종목명||''}</span><span class="rc">${x.종목코드} · ${x.시장||''}</span><span class="rp">${(d.cur||'').toLocaleString()}원</span></div>`;
  if(d.risk_on){let w=src==='60분'?'60분봉에서 감지':(src==='과거'?'과거 구간에서 감지':'감지됨');html+=`<div class="risk-alert"><span>⚠️</span><span class="rt">하락 위험 신호 — 반대 작도 ${w}</span></div>`;}
  const mk=(v,nm,col)=>{const m=M[v]||{up:'-',dn:'-'};return `<label><input type="checkbox" class="mtd" value="${v}" style="accent-color:${col}"> ${nm} <span class="up">↑${m.up}%</span><span class="dn">↓${m.dn}%</span></label>`;};
  html+=`<div class="methods">${mk('ell','엘리엇','#7f77dd')}${mk('mc','몬테카를로','#378add')}${mk('fib','피보나치','#1d9e75')}${mk('gann','갠','#ba7517')}</div>`;
  html+=`<div class="zoombar"><button id="zin">+ 확대</button><button id="zout">− 축소</button><button id="zall">전체</button></div>`;
  html+=`<div class="chart-host"><canvas id="cv"></canvas><div class="linetip" id="tip"></div></div>`;
  html+=`<div class="legend"><span><i style="background:#000"></i>2일선</span><span><i style="background:#1d9e75"></i>상승목표</span><span><i style="background:#d4537e"></i>위험</span><span><i style="background:#8a98a8"></i>삼각수렴</span><span style="color:#a8b3c0">| 점선 우측=미래 3개월</span></div>`;
  let info='';d.draws.forEach((dd,i)=>{info+=`<div class="di"><span class="${dd.alive?'alive':'dead'}">${dd.alive?'● 살아있음':'○ 지남'}</span> 작도${i+1} · 매수 <span class="v">${dd.ep.toLocaleString()}</span> · 1차 <span class="v">${dd.yc.toLocaleString()}</span></div>`;});
  html+=`<div class="draws-info">${info}</div>`;
  box.innerHTML=html;
  setTimeout(()=>mkChart(d,pj),50);
}

function mkChart(data,pj){
  const cv=document.getElementById('cv'),tip=document.getElementById('tip');
  const ch=data.chart,n=ch.length,draws=data.draws||[],risks=data.risks||[];
  const FUT=(pj&&pj.fut)||63, TOTAL=n+FUT, cur=data.cur;
  const c=ch.map(r=>r.c),ma2=ch.map(r=>r.m2);
  const DPR=window.devicePixelRatio||1;const padR=64,padL=8,padT=14,padB=38;
  let W,H,plot,viewS=0,viewE=TOTAL-1;
  {let cand=[];draws.forEach(d=>cand.push(d.A_t1));if(data.view_start!=null)cand.push(data.view_start);
   if(cand.length){let mn=Math.min(...cand);viewS=Math.max(0,mn-4);}viewE=TOTAL-1;}
  function futDates(){let ds=[],last=ch[n-1].d;ds=[];let mo=parseInt((last.split('/')[0]))||1,dy=parseInt(last.split('/')[1])||1;
    let dt=new Date(2026,mo-1,dy);let out=[],k=0;while(k<FUT){dt=new Date(dt.getTime()+86400000);const w=dt.getDay();if(w===0||w===6)continue;out.push((dt.getMonth()+1)+'/'+dt.getDate());k++;}return out;}
  const fdates=futDates();
  function lbl(i){return i<n?ch[i].d:(fdates[i-n]||'');}
  function lay(){W=cv.clientWidth;H=cv.clientHeight;cv.width=W*DPR;cv.height=H*DPR;cv.getContext('2d').setTransform(DPR,0,0,DPR,0,0);
    const vs=Math.max(0,viewS),ve=Math.min(TOTAL-1,viewE);
    let lo=1e18,hi=-1e18;
    for(let i=vs;i<=Math.min(ve,n-1);i++){lo=Math.min(lo,ch[i].l);hi=Math.max(hi,ch[i].h);}
    if(ve>=n){if(pj){hi=Math.max(hi,pj.up_target||hi);lo=Math.min(lo,pj.dn_target||lo);}}
    risks.forEach(r=>{if(r.yc)lo=Math.min(lo,r.yc);});
    if(lo>hi){lo=Math.min(...c);hi=Math.max(...c);}
    lo*=0.97;hi*=1.03;plot={lo,hi,x0:padL,x1:W-padR,y0:padT,y1:H-padB};}
  const span=()=>(viewE-viewS+1);
  const xOf=i=>plot.x0+(i-viewS+0.5)/span()*(plot.x1-plot.x0);
  const yOf=v=>plot.y1-(v-plot.lo)/(plot.hi-plot.lo)*(plot.y1-plot.y0);
  const vOf=y=>plot.lo+(plot.y1-y)/(plot.y1-plot.y0)*(plot.hi-plot.lo);
  const iOfX=x=>Math.round(viewS+(x-plot.x0)/(plot.x1-plot.x0)*span()-0.5);
  const FF=()=>getComputedStyle(document.body).fontFamily;
  const ms=()=>Array.from(document.querySelectorAll('.mtd:checked')).map(c=>c.value);
  function seg(ctx,i0,y0,i1,y1,color,w,dash){if(i1<viewS||i0>viewE)return;ctx.strokeStyle=color;ctx.lineWidth=w;ctx.setLineDash(dash||[]);ctx.beginPath();ctx.moveTo(xOf(i0),yOf(y0));ctx.lineTo(xOf(i1),yOf(y1));ctx.stroke();ctx.setLineDash([]);}
  function fwave(ctx,fn,color,wid,dash){ctx.strokeStyle=color;ctx.lineWidth=wid;ctx.setLineDash(dash||[]);ctx.beginPath();
    const start=n-1,end=Math.min(viewE,TOTAL-1);ctx.moveTo(xOf(start),yOf(cur));
    for(let i=start;i<=end;i++){const t=(i-(n-1))/FUT;ctx.lineTo(xOf(i),yOf(fn(t)));}ctx.stroke();ctx.setLineDash([]);}
  let prog=0;
  function draw(mx,my){
    const ctx=cv.getContext('2d');ctx.clearRect(0,0,W,H);ctx.font='12px '+FF();
    ctx.strokeStyle='#eef1f5';ctx.lineWidth=1;ctx.fillStyle='#9aa6b2';ctx.textAlign='left';
    for(let g=0;g<=4;g++){const v=plot.lo+(plot.hi-plot.lo)*g/4,y=yOf(v);ctx.beginPath();ctx.moveTo(plot.x0,y);ctx.lineTo(plot.x1,y);ctx.stroke();ctx.fillText(Math.round(v).toLocaleString(),plot.x1+6,y+4);}
    ctx.fillStyle='#5a6b7d';ctx.textAlign='center';ctx.font='12px '+FF();
    for(let t=0;t<6;t++){const idx=viewS+Math.round((span()-1)*t/5);const L=lbl(idx);if(L)ctx.fillText(L,xOf(idx),plot.y1+16);}
    const nowX=xOf(n-1);
    if(viewE>=n){ctx.fillStyle='rgba(120,140,160,.05)';ctx.fillRect(nowX,plot.y0,plot.x1-nowX,plot.y1-plot.y0);
      ctx.strokeStyle='rgba(26,58,92,.3)';ctx.setLineDash([5,4]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(nowX,plot.y0);ctx.lineTo(nowX,plot.y1);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#8a98a8';ctx.fillText('현재',nowX,plot.y0+12);}
    const cw=Math.max(1.5,(plot.x1-plot.x0)/span()*0.6);
    for(let i=Math.max(0,viewS);i<=Math.min(viewE,n-1);i++){const r=ch[i],x=xOf(i),u=r.c>=r.o;
      ctx.strokeStyle=u?'rgba(226,75,74,.5)':'rgba(55,138,221,.5)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,yOf(r.h));ctx.lineTo(x,yOf(r.l));ctx.stroke();
      ctx.fillStyle=u?'rgba(226,75,74,.45)':'rgba(55,138,221,.45)';const yo=yOf(r.o),yc=yOf(r.c);ctx.fillRect(x-cw/2,Math.min(yo,yc),cw,Math.max(1.5,Math.abs(yc-yo)));}
    ctx.strokeStyle='#222';ctx.lineWidth=1;ctx.beginPath();let st=false;
    for(let i=Math.max(0,viewS);i<=Math.min(viewE,n-1);i++){if(ma2[i]==null)continue;const x=xOf(i),y=yOf(ma2[i]);st?ctx.lineTo(x,y):ctx.moveTo(x,y);st=true;}ctx.stroke();
    risks.forEach(d=>{if(!d.price_only){seg(ctx,d.A_t1-1,ma2[d.A_t1-1]||d.A_y1,d.A_t1,d.A_y1,'#d4537e',2.4);seg(ctx,d.B_t1,d.B_y1,Math.round(d.xc),d.yc,'rgba(212,83,126,.6)',1.2,[4,3]);}
      ctx.strokeStyle='rgba(212,83,126,.85)';ctx.lineWidth=1.4;ctx.setLineDash(d.price_only?[6,4]:[]);ctx.beginPath();ctx.moveTo(plot.x0,yOf(d.yc));ctx.lineTo(plot.x1,yOf(d.yc));ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#d4537e';ctx.fillRect(plot.x1-2,yOf(d.yc)-9,64,18);ctx.fillStyle='#fff';ctx.font='11px '+FF();ctx.fillText('위험 '+Math.round(d.yc).toLocaleString(),plot.x1+2,yOf(d.yc)+3);});
    draws.forEach(d=>{const al=d.alive?1:.32;
      seg(ctx,d.A_t1-1,ma2[d.A_t1-1]||d.A_y1,d.A_t1,d.A_y1,'rgba(226,75,74,'+al+')',2.4);
      seg(ctx,d.A_t1,d.A_y1,Math.round(d.xc),d.yc,'rgba(226,75,74,'+(al*.5)+')',1,[4,3]);
      seg(ctx,d.B_t1-1,ma2[d.B_t1-1]||d.B_y1,d.B_t1,d.B_y1,'rgba(55,138,221,'+al+')',2.4);
      seg(ctx,d.B_t1,d.B_y1,Math.round(d.xc),d.yc,'rgba(55,138,221,'+(al*.5)+')',1,[4,3]);
      ctx.strokeStyle='rgba(127,119,221,'+al+')';ctx.lineWidth=1.2;ctx.setLineDash([]);ctx.beginPath();ctx.moveTo(plot.x0,yOf(d.yc));ctx.lineTo(plot.x1,yOf(d.yc));ctx.stroke();
      if(d.entry>=viewS&&d.entry<=viewE&&d.entry<n){ctx.fillStyle=d.alive?'#e8743b':'rgba(232,116,59,.4)';const ex=xOf(d.entry),ey=yOf(c[d.entry]);ctx.beginPath();ctx.moveTo(ex,ey-6);ctx.lineTo(ex-5,ey+5);ctx.lineTo(ex+5,ey+5);ctx.closePath();ctx.fill();}});
    if(viewE>=n&&pj){
      const us=pj.up_slope||0, upT=pj.up_target, dnT=pj.dn_target, vol=pj.volatility||0.02;
      fwave(ctx,t=>cur+(upT-cur)*t+Math.sin(t*Math.PI*3)*cur*0.03,'rgba(29,158,117,.95)',2.4,[6,4]);
      fwave(ctx,t=>cur+(dnT-cur)*t+Math.sin(t*Math.PI*3)*cur*0.025,'rgba(212,83,126,.9)',2.4,[6,4]);
      [1,-1].forEach(s=>fwave(ctx,t=>cur+s*cur*0.10*(1-t),'rgba(138,152,168,.6)',1.3));
      fwave(ctx,t=>cur+Math.sin(t*Math.PI*5)*cur*0.10*(1-t),'rgba(138,152,168,.8)',1.4);
      const M=ms();
      if(M.includes('ell'))fwave(ctx,t=>{const pts=[0,0.11,0.05,0.24,0.16,0.32];const sg=t*5,k=Math.floor(sg),f=sg-k,a=pts[Math.min(k,4)],b=pts[Math.min(k+1,5)];return cur*(1+(a+(b-a)*f));},'rgba(127,119,221,.6)',1.7);
      if(M.includes('mc'))for(let p=0;p<8;p++){ctx.strokeStyle='rgba(55,138,221,.13)';ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(xOf(n-1),yOf(cur));let v=cur;for(let i=n;i<=Math.min(viewE,TOTAL-1);i++){v*=Math.exp((us/cur*0.4)+(Math.random()-0.5)*vol*2.2);ctx.lineTo(xOf(i),yOf(v));}ctx.stroke();}
      if(M.includes('fib'))(pj.fib_levels||[]).forEach(lv=>{const up=lv>cur;ctx.strokeStyle=up?'rgba(29,158,117,.4)':'rgba(212,83,126,.4)';ctx.setLineDash([3,3]);ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(xOf(n-1),yOf(lv));ctx.lineTo(xOf(Math.min(viewE,TOTAL-1)),yOf(lv));ctx.stroke();ctx.setLineDash([]);});
      if(M.includes('gann'))fwave(ctx,t=>{const step=Math.floor(t*6)/6;return cur+(upT-cur)*0.7*step+Math.sin(t*Math.PI*6)*cur*0.015;},'rgba(186,117,23,.55)',1.6);
    }
    if(mx!=null&&mx>=plot.x0&&mx<=plot.x1&&my!=null){
      ctx.strokeStyle='rgba(26,58,92,.5)';ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(mx,plot.y0);ctx.lineTo(mx,plot.y1);ctx.stroke();ctx.beginPath();ctx.moveTo(plot.x0,my);ctx.lineTo(plot.x1,my);ctx.stroke();ctx.setLineDash([]);
      ctx.fillStyle='#1a3a5c';ctx.fillRect(plot.x1,my-11,padR-2,22);ctx.fillStyle='#fff';ctx.font='13px '+FF();ctx.textAlign='left';ctx.fillText(Math.round(vOf(my)).toLocaleString(),plot.x1+5,my+4);
      const idx=iOfX(mx),L=lbl(idx);if(L){const tw=ctx.measureText(L).width+12;ctx.fillStyle='#1a3a5c';ctx.fillRect(mx-tw/2,plot.y1+2,tw,18);ctx.fillStyle='#fff';ctx.textAlign='center';ctx.fillText(L,mx,plot.y1+14);}
    }
  }
  let lastMx=null,lastMy=null;
  function hover(e){const r=cv.getBoundingClientRect();lastMx=e.clientX-r.left;lastMy=e.clientY-r.top;draw(lastMx,lastMy);tip.style.display='none';
    draws.forEach(d=>{if(Math.abs(lastMy-yOf(d.yc))<6){tip.style.display='block';tip.style.background='#7f77dd';tip.textContent='교차점 '+d.yc.toLocaleString();tip.style.left=Math.min(lastMx+12,W-90)+'px';tip.style.top=(yOf(d.yc)-28)+'px';}});
    risks.forEach(d=>{if(Math.abs(lastMy-yOf(d.yc))<6){tip.style.display='block';tip.style.background='#d4537e';tip.textContent='위험 '+d.yc.toLocaleString();tip.style.left=Math.min(lastMx+12,W-110)+'px';tip.style.top=(yOf(d.yc)-28)+'px';}});}
  cv.addEventListener('mousemove',hover);
  cv.addEventListener('mouseleave',()=>{lastMx=lastMy=null;draw(null,null);tip.style.display='none';});
  cv.addEventListener('wheel',e=>{e.preventDefault();const r=cv.getBoundingClientRect(),mx=e.clientX-r.left;const center=iOfX(mx),sp=span();const ns=Math.max(15,Math.min(TOTAL,Math.round(sp*(e.deltaY>0?1.15:0.87))));const ratio=(center-viewS)/sp;let s=Math.round(center-ns*ratio),en=s+ns-1;if(s<0){s=0;en=ns-1;}if(en>TOTAL-1){en=TOTAL-1;s=Math.max(0,en-ns+1);}viewS=s;viewE=en;lay();draw(lastMx,lastMy);},{passive:false});
  let drag=false,dx0=0,dvs=0;
  cv.addEventListener('mousedown',e=>{drag=true;dx0=e.clientX;dvs=viewS;});
  window.addEventListener('mouseup',()=>drag=false);
  cv.addEventListener('mousemove',e=>{if(!drag)return;const dx=e.clientX-dx0,per=(plot.x1-plot.x0)/span();let sh=Math.round(-dx/per),sp=span(),s=dvs+sh;if(s<0)s=0;if(s+sp>TOTAL)s=TOTAL-sp;viewS=s;viewE=s+sp-1;lay();draw(lastMx,lastMy);});
  document.getElementById('zin').onclick=()=>{const sp=span(),ns=Math.max(15,Math.round(sp*0.7)),md=Math.round((viewS+viewE)/2);viewS=Math.max(0,md-Math.round(ns/2));viewE=Math.min(TOTAL-1,viewS+ns-1);lay();draw();};
  document.getElementById('zout').onclick=()=>{const sp=span(),ns=Math.min(TOTAL,Math.round(sp*1.4)),md=Math.round((viewS+viewE)/2);viewS=Math.max(0,md-Math.round(ns/2));viewE=Math.min(TOTAL-1,viewS+ns-1);lay();draw();};
  document.getElementById('zall').onclick=()=>{viewS=0;viewE=TOTAL-1;lay();draw();};
  document.querySelectorAll('.mtd').forEach(c=>c.addEventListener('change',()=>draw(lastMx,lastMy)));
  lay();draw(null,null);
  window.addEventListener('resize',()=>{lay();draw(null,null);});
}
</script>
